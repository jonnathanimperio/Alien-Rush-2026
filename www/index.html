<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ALIEN RUSH FX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;margin:0;padding:0;}
body{background:#000;font-family:'Share Tech Mono',monospace;}
#gameWrap{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}
canvas{
  display:block;
  image-rendering:pixelated;
  touch-action:none;
  width:100vw;
  height:50vw;
  max-height:100vh;
}
@media (orientation:landscape){
  canvas{
    width:auto;
    height:100vh;
    max-width:100vw;
  }
}
/* Controles ficam invisíveis até começar o jogo */
#controls{visibility:hidden;pointer-events:none;}
#controls.playing{visibility:visible;pointer-events:none;}
#controls.playing .btn{pointer-events:auto;}

/* Botão Pause */
.btn-pause{
  position:absolute;
  top:12%;right:2%;
  width:40px;height:40px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  border:2px solid rgba(255,255,255,0.35);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  user-select:none;
  touch-action:none;
  display:none;
  align-items:center;
  justify-content:center;
  -webkit-tap-highlight-color:transparent;
  z-index:10;
  box-shadow:0 0 8px rgba(0,0,0,0.5);
}
.btn-pause.show{display:flex;}
.btn-pause:active{
  background:rgba(255,255,255,0.2);
  transform:scale(0.92);
}

/* Pause overlay */
#pauseMenu{
  position:absolute;inset:0;
  background:rgba(0,0,10,0.92);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;z-index:20;
}
#pauseMenu.show{display:flex;}
#pauseMenu h2{
  font-family:'Orbitron',monospace;font-size:24px;font-weight:900;
  color:#fff;
  text-shadow:0 0 18px rgba(255,255,255,0.4);
  letter-spacing:4px;
}
#pauseMenu .pause-btn{
  width:220px;padding:14px;
  border-radius:10px;
  font-family:'Orbitron',monospace;font-size:14px;font-weight:700;
  letter-spacing:2px;cursor:pointer;
  text-align:center;
  transition:all .15s;
}
#pauseMenu .pause-btn:active{transform:scale(0.96);}
.pause-continue{
  background:linear-gradient(180deg, #00c2e8 0%, #006bbd 50%, #003f8f 100%);
  border:1px solid #00eaff;color:#fff;
  text-shadow:0 0 10px rgba(255,255,255,0.5);
  box-shadow:0 0 20px rgba(0,200,255,0.4);
}
.pause-lobby{
  background:linear-gradient(180deg, #3a1a1a 0%, #1a0a0a 100%);
  border:1px solid rgba(255,80,80,0.4);color:#ff6666;
  text-shadow:0 0 8px rgba(255,80,80,0.4);
  box-shadow:0 0 12px rgba(255,0,0,0.2);
}

/* Volume sliders */
.pause-sliders{
  width:240px;
  display:flex;flex-direction:column;gap:14px;
  background:rgba(20,25,50,0.6);
  border:1px solid rgba(100,160,255,0.2);
  border-radius:12px;padding:16px 18px;
}
.slider-row{
  display:flex;align-items:center;gap:10px;
}
.slider-label{
  font-family:'Share Tech Mono',monospace;
  font-size:11px;color:rgba(180,210,255,0.7);
  width:72px;flex-shrink:0;
}
.slider-val{
  font-family:'Orbitron',monospace;
  font-size:10px;color:#fff;
  width:36px;text-align:right;
}
.vol-slider{
  -webkit-appearance:none;appearance:none;
  flex:1;height:6px;
  background:rgba(0,20,40,0.8);
  border-radius:3px;outline:none;
  border:1px solid rgba(0,200,255,0.3);
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:20px;height:20px;
  border-radius:50%;
  background:linear-gradient(180deg,#00d4ff,#0080cc);
  border:2px solid #fff;
  box-shadow:0 0 10px rgba(0,200,255,0.5);
  cursor:pointer;
}
.vol-slider::-moz-range-thumb{
  width:18px;height:18px;
  border-radius:50%;
  background:linear-gradient(180deg,#00d4ff,#0080cc);
  border:2px solid #fff;
  box-shadow:0 0 10px rgba(0,200,255,0.5);
  cursor:pointer;
}
.sfx-slider{
  border-color:rgba(255,180,0,0.3);
}
.sfx-slider::-webkit-slider-thumb{
  background:linear-gradient(180deg,#ffaa00,#cc7700);
  box-shadow:0 0 10px rgba(255,160,0,0.5);
}
.sfx-slider::-moz-range-thumb{
  background:linear-gradient(180deg,#ffaa00,#cc7700);
  box-shadow:0 0 10px rgba(255,160,0,0.5);
}

/* === CONTROLES NEON FLUTUANTES === */
#controls{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:0;
  background:transparent;
  border:none;
  pointer-events:none;
  height:0;
}

/* D-PAD ESQUERDO (5 botões circulares à esquerda) */
.btn{
  position:absolute;
  width:64px;height:64px;
  border-radius:50%;
  background:rgba(0,0,0,0.65);
  border:2px solid #ccff00;
  color:#ccff00;
  font-family:'Share Tech Mono',monospace;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
  user-select:none;
  touch-action:none;
  text-shadow:0 0 8px #ccff00,0 0 14px #ccff00;
  box-shadow:0 0 12px rgba(204,255,0,0.4),inset 0 0 8px rgba(204,255,0,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:auto;
  image-rendering:pixelated;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{
  background:#ccff00;
  color:#000;
  text-shadow:none;
  transform:scale(0.94);
}

/* ESQUERDA: ◀ ▶ no meio, ▼ embaixo no centro */
#bL{bottom:88px;left:20px;}              /* Esquerda */
#bR{bottom:88px;left:88px;}              /* Direita */
#bC{bottom:20px;left:54px;}              /* Agachar (embaixo, no meio) */

/* DIREITA: PULAR + Atirar + Atirar↑ + Granada */
#bJ{
  bottom:88px;right:88px;
  background:rgba(0,40,15,0.7);
  border-color:#00ff66;
  color:#00ff66;
  text-shadow:0 0 8px #00ff66,0 0 14px #00ff66;
  box-shadow:0 0 12px rgba(0,255,100,0.5),inset 0 0 8px rgba(0,255,100,0.2);
}
#bJ:active{background:#00ff66;color:#000;text-shadow:none;}

#bS{bottom:20px;right:20px;font-size:24px;}      /* Atirar */
#bU{bottom:20px;right:88px;font-size:20px;}      /* Atirar ↑ */
#bG{
  bottom:88px;right:20px;
  background:rgba(40,15,0,0.7);
  border-color:#ff8800;
  color:#ff8800;
  text-shadow:0 0 8px #ff8800,0 0 14px #ff8800;
  box-shadow:0 0 12px rgba(255,136,0,0.5),inset 0 0 8px rgba(255,136,0,0.2);
  font-size:18px;
}
#bG:active{background:#ff8800;color:#000;text-shadow:none;}

#hint{display:none;}
/* ─── ANALÓGICO (joystick) ─── */
#joystick{
  position:absolute;
  bottom:24px;left:24px;
  width:96px;height:96px;
  border-radius:50%;
  background:radial-gradient(circle at 50% 45%, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 70%, rgba(255,255,255,0.02) 100%);
  border:2px solid rgba(204,255,0,0.25);
  box-shadow:0 0 12px rgba(204,255,0,0.12),inset 0 0 16px rgba(0,0,0,0.25);
  pointer-events:auto;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  z-index:5;
}
#joystickStick{
  position:absolute;
  top:50%;left:50%;
  width:42px;height:42px;
  margin:-21px 0 0 -21px;
  border-radius:50%;
  background:radial-gradient(circle at 38% 32%, rgba(240,255,208,0.45) 0%, rgba(143,194,58,0.35) 55%, rgba(79,122,24,0.3) 100%);
  border:1px solid rgba(204,255,0,0.35);
  box-shadow:0 0 10px rgba(204,255,0,0.3),inset 0 -3px 6px rgba(0,0,0,0.2),inset 0 2px 4px rgba(255,255,255,0.3);
  pointer-events:none;
  transition:transform 0.04s linear;
}
@media (max-width:500px){
  #joystick{bottom:18px;left:16px;width:84px;height:84px;}
  #joystickStick{width:38px;height:38px;margin:-19px 0 0 -19px;}
}

/* Botões menores em telas pequenas */
@media (max-width:500px){
  .btn{width:58px;height:58px;font-size:20px;}
  /* Esquerda */
  #bL{bottom:76px;left:14px;}
  #bR{bottom:76px;left:76px;}
  #bC{bottom:14px;left:45px;}
  /* Direita */
  #bJ{bottom:76px;right:76px;}
  #bS{bottom:14px;right:14px;font-size:22px;}
  #bU{bottom:14px;right:76px;font-size:18px;}
  #bG{bottom:76px;right:14px;font-size:16px;}
}

/* LOBBY — premium modern look inspired by mobile game stores */
#lobby{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(50,30,120,0.35) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 85%, rgba(0,100,180,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(40,20,80,0.2) 0%, transparent 60%),
    linear-gradient(160deg, #0a0a25 0%, #08102a 40%, #0a0620 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:10px 8px;gap:8px;overflow-y:auto;
}
/* animated star field */
#lobby::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1px 1px at 28% 60%, rgba(200,220,255,0.8), transparent),
    radial-gradient(1px 1px at 47% 30%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 62% 75%, rgba(180,220,255,0.7), transparent),
    radial-gradient(1px 1px at 78% 20%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 90% 65%, rgba(200,220,255,0.8), transparent),
    radial-gradient(2px 2px at 35% 88%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1.5px 1.5px at 55% 12%, rgba(180,220,255,0.8), transparent);
  background-size:600px 600px;
  opacity:0.6;
  animation:twinkle 6s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:0.5}50%{opacity:0.8}}
#lobby > *{position:relative;z-index:1;}

#lobby h1{
  font-family:'Orbitron',monospace;font-size:26px;font-weight:900;
  background:linear-gradient(180deg,#00eaff 0%,#007bff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(0,200,255,0.6));
  letter-spacing:4px;margin:6px 0 0;
}
#lobby .subtitle{color:rgba(160,200,255,0.65);font-size:9px;letter-spacing:5px;text-transform:uppercase;margin-bottom:4px;}

/* Top coin bar */
.lobby-coins{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(180deg,#3a2800 0%,#1a1000 100%);
  border:1px solid rgba(255,180,0,0.5);
  padding:7px 20px;border-radius:24px;
  font-size:15px;color:#ffd700;
  font-family:'Orbitron',monospace;font-weight:700;
  text-shadow:0 0 12px rgba(255,180,0,0.6);
  box-shadow:0 0 20px rgba(255,160,0,0.25),inset 0 1px 0 rgba(255,220,100,0.3);
}
.fx-icon{font-size:18px;filter:drop-shadow(0 0 6px #ffa500);}

/* Grid layout */
.lobby-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:10px;width:100%;}

/* Panels with premium look */
.lobby-panel{
  background:
    linear-gradient(180deg, rgba(40,60,120,0.35) 0%, rgba(15,25,55,0.45) 100%);
  border:1px solid rgba(100,160,255,0.25);
  border-radius:14px;padding:12px;
  box-shadow:
    0 4px 20px rgba(0,10,30,0.5),
    inset 0 1px 0 rgba(255,255,255,0.08);
  backdrop-filter:blur(8px);
}
.lobby-panel h3{
  font-family:'Orbitron',monospace;font-size:10px;color:#7ad8ff;
  letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
  text-shadow:0 0 10px rgba(120,200,255,0.5);
}

/* Robot colors as gemstones */
.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.color-opt{
  width:100%;aspect-ratio:1;
  border-radius:12px;cursor:pointer;
  border:2px solid rgba(255,255,255,0.1);
  transition:all .2s;position:relative;
  box-shadow:
    inset 0 -3px 6px rgba(0,0,0,0.4),
    inset 0 3px 6px rgba(255,255,255,0.25),
    0 3px 8px rgba(0,0,0,0.5);
  overflow:hidden;
}
/* Gem shine effect */
.color-opt::before{
  content:'';position:absolute;top:8%;left:12%;width:40%;height:30%;
  background:linear-gradient(135deg,rgba(255,255,255,0.6),transparent 60%);
  border-radius:50% 50% 60% 40%;
  filter:blur(1px);pointer-events:none;
}
.color-opt::after{
  content:'';position:absolute;bottom:10%;right:15%;width:25%;height:20%;
  background:radial-gradient(circle,rgba(255,255,255,0.35),transparent 60%);
  border-radius:50%;pointer-events:none;
}
.color-opt.selected{
  border-color:#fff;
  box-shadow:
    0 0 22px rgba(255,255,255,0.5),
    inset 0 -3px 6px rgba(0,0,0,0.4),
    inset 0 3px 6px rgba(255,255,255,0.3);
  transform:scale(1.05);
}
.color-opt:hover{transform:scale(1.08);}
.color-opt.selected:hover{transform:scale(1.12);}

/* Weapons list — premium cards */
.weapons-list{display:flex;flex-direction:column;gap:6px;}
.weapon-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:10px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  transition:all .2s;
  background:linear-gradient(180deg, rgba(30,50,90,0.4), rgba(15,25,50,0.5));
  position:relative;overflow:hidden;
}
.weapon-item:hover{border-color:rgba(120,180,255,0.5);transform:translateX(2px);}
.weapon-item.selected-weapon{
  border-color:#cc44ff;
  background:linear-gradient(180deg, rgba(120,40,200,0.35), rgba(60,20,120,0.5));
  box-shadow:0 0 14px rgba(180,80,255,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
}
.weapon-item.locked{opacity:.4;cursor:default;}
.weapon-item.affordable{
  border-color:rgba(255,215,0,0.4);
  background:linear-gradient(180deg, rgba(80,60,20,0.4), rgba(40,30,10,0.5));
}
.weapon-icon{
  font-size:22px;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg, rgba(80,120,200,0.25), rgba(20,40,80,0.4));
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  flex-shrink:0;
}
.weapon-item.selected-weapon .weapon-icon{
  background:linear-gradient(180deg, rgba(200,80,255,0.35), rgba(80,20,150,0.5));
  border-color:rgba(220,120,255,0.5);
}
.weapon-info{flex:1;min-width:0;}
.weapon-name{font-size:13px;color:#f0f6ff;font-family:'Orbitron',monospace;font-weight:700;margin-bottom:2px;}
.weapon-price{font-size:10px;color:#ffd700;font-family:'Share Tech Mono',monospace;}
.weapon-price.free{color:#6fff7c;}
.weapon-price.owned-label{color:#7ad8ff;}
.weapon-visual{
  width:78px;height:36px;flex-shrink:0;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

/* Progress panel */
.progress-info{display:flex;flex-direction:column;gap:6px;}

/* Phase selector grid */
.phase-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:6px;
}
.phase-btn{
  padding:6px 0;border-radius:6px;text-align:center;
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .12s;user-select:none;
}
.phase-btn.unlocked{
  background:rgba(0,40,80,0.6);border:1px solid rgba(0,200,255,0.3);
  color:#66ccff;
}
.phase-btn.unlocked:active{transform:scale(0.92);}
.phase-btn.selected{
  background:linear-gradient(180deg,#003366,#001a33);
  border:2px solid #0ff;color:#fff;
  box-shadow:0 0 12px rgba(0,255,255,0.4);
  text-shadow:0 0 8px rgba(0,255,255,0.6);
}
.phase-btn.locked{
  background:rgba(20,20,30,0.5);border:1px solid rgba(80,80,100,0.3);
  color:#444;font-size:9px;cursor:default;
}
.progress-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;}
.progress-row .lbl{color:rgba(160,200,255,0.55);font-family:'Share Tech Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.progress-row .val{color:#fff;font-family:'Orbitron',monospace;font-weight:700;}
.phase-bar{
  width:100%;height:8px;background:rgba(0,20,40,0.6);
  border-radius:4px;overflow:hidden;margin:4px 0;
  border:1px solid rgba(120,180,255,0.2);
}
.phase-bar-fill{
  height:100%;
  background:linear-gradient(90deg,#00eaff,#7a50ff);
  box-shadow:0 0 10px rgba(0,200,255,0.5);
  border-radius:4px;
}

/* Play button — giant glowing */
.btn-play{
  width:100%;padding:16px;
  background:linear-gradient(180deg, #00c2e8 0%, #006bbd 50%, #003f8f 100%);
  border:1px solid #00eaff;border-radius:14px;
  color:#fff;font-family:'Orbitron',monospace;font-size:16px;font-weight:900;
  letter-spacing:3px;cursor:pointer;
  text-shadow:0 0 14px rgba(255,255,255,0.6), 0 2px 2px rgba(0,0,0,0.6);
  box-shadow:
    0 0 30px rgba(0,200,255,0.5),
    inset 0 2px 0 rgba(255,255,255,0.4),
    inset 0 -3px 8px rgba(0,0,0,0.3),
    0 6px 16px rgba(0,80,160,0.5);
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-play:hover{transform:translateY(-1px);box-shadow:0 0 40px rgba(0,220,255,0.7),inset 0 2px 0 rgba(255,255,255,0.5),0 8px 20px rgba(0,80,160,0.6);}
.btn-play:active{transform:translateY(1px);}

/* Ad reward button */
.btn-ad{
  width:100%;padding:12px;
  background:linear-gradient(180deg, #2a8800 0%, #1a5500 50%, #0a3300 100%);
  border:1px solid #88ff00;border-radius:14px;
  color:#fff;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;
  letter-spacing:2px;cursor:pointer;
  text-shadow:0 0 10px rgba(136,255,0,0.6), 0 2px 2px rgba(0,0,0,0.6);
  box-shadow:0 0 20px rgba(100,255,0,0.3),inset 0 2px 0 rgba(255,255,255,0.3),0 4px 12px rgba(0,60,0,0.5);
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-ad:hover{transform:translateY(-1px);box-shadow:0 0 30px rgba(120,255,0,0.5),inset 0 2px 0 rgba(255,255,255,0.4);}
.btn-ad:active{transform:translateY(1px);}

/* Pre-phase bonus ads */
.prephase-ads{
  display:flex;gap:8px;width:100%;justify-content:center;
}
.btn-prephase{
  padding:8px 16px;
  background:linear-gradient(180deg, #1a3a00 0%, #0d2000 100%);
  border:1px solid rgba(136,255,0,0.5);border-radius:10px;
  color:#88ff88;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  cursor:pointer;
  text-shadow:0 0 4px rgba(100,255,0,0.3);
  transition:all .15s;text-align:center;
}
.btn-prephase:active{transform:scale(0.96);background:rgba(40,80,20,0.8);}

/* Gamepad status */
.gamepad-status{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  text-align:center;
  padding:4px 8px;
  min-height:16px;
  color:rgba(150,200,255,0.6);
  letter-spacing:1px;
}
.gamepad-status.connected{
  color:#44ff88;
}
.gamepad-status .gp-map{
  font-size:9px;
  color:rgba(150,200,255,0.4);
  margin-top:2px;
}

/* Buy button */
.btn-buy{
  background:linear-gradient(180deg,#ffd700,#cc9900);
  border:none;color:#1a1000;
  font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  padding:5px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;
  box-shadow:0 2px 6px rgba(255,180,0,0.4),inset 0 1px 0 rgba(255,255,255,0.4);
  transition:all .15s;
}
.btn-buy:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(255,200,0,0.6),inset 0 1px 0 rgba(255,255,255,0.5);}

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
const W=640,H=320,GND=272;
const ov=document.getElementById('overlay');
const lobby=document.getElementById('lobby');
const MAX_ALIENS=9;

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let inp={left:false,right:false,jump:false,crouch:false,shootUp:false};
// ═══════════════════════════════════════════════════════════════════
// ─── GAMEPAD SUPPORT ─────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
let gamepadConnected=false;
let gamepadName='';
let gpPrev={shoot:false,shootUp:false,grenade:false,pause:false,jump:false};

function pollGamepad(){
  let gamepads;
  try{ gamepads=navigator.getGamepads?navigator.getGamepads():[]; }catch(e){return;}
  let gp=null;
  for(const g of gamepads){ if(g&&g.connected){gp=g;break;} }
  if(!gp){
    if(gamepadConnected){gamepadConnected=false;gamepadName='';}
    return;
  }
  if(!gamepadConnected){
    gamepadConnected=true;
    gamepadName=gp.id.slice(0,30);
  }
  const b=gp.buttons;
  const ax=gp.axes;
  const deadzone=0.3;

  // D-pad + left stick → movement
  inp.left=(b[14]&&b[14].pressed)||(ax[0]<-deadzone);
  inp.right=(b[15]&&b[15].pressed)||(ax[0]>deadzone);
  const upPressed=(b[12]&&b[12].pressed)||(ax[1]<-deadzone);
  const downPressed=(b[13]&&b[13].pressed)||(ax[1]>deadzone);
  inp.crouch=downPressed;

  // A / Cross (button 0) → Jump
  inp.jump=b[0]&&b[0].pressed;

  // B / Circle (button 1) → Shoot (on press, not hold)
  const shootNow=b[1]&&b[1].pressed;
  if(shootNow&&!gpPrev.shoot&&running) shoot(inp.shootUp||upPressed);
  gpPrev.shoot=shootNow;

  // X / Square (button 2) → Shoot Up (on press)
  const shootUpNow=b[2]&&b[2].pressed;
  if(shootUpNow&&!gpPrev.shootUp&&running) shoot(true);
  gpPrev.shootUp=shootUpNow;
  inp.shootUp=shootUpNow;

  // Y / Triangle (button 3) → Grenade (on press)
  const grenadeNow=b[3]&&b[3].pressed;
  if(grenadeNow&&!gpPrev.grenade&&running) throwGrenade();
  gpPrev.grenade=grenadeNow;

  // R1/R2 (button 5/7) → Crouch
  if((b[5]&&b[5].pressed)||(b[7]&&b[7].pressed)) inp.crouch=true;

  // Start (button 9) → Pause
  const pauseNow=b[9]&&b[9].pressed;
  if(pauseNow&&!gpPrev.pause) togglePause();
  gpPrev.pause=pauseNow;

  // Select (button 8) → go to lobby when in overlay
  if(b[8]&&b[8].pressed){
    const ov=document.getElementById('overlay');
    if(ov&&ov.classList.contains('show')) goLobby();
  }

  // L1 (button 4) on lobby → start game
  if(b[0]&&b[0].pressed&&!running&&!paused&&lobby.style.display==='flex'){
    document.getElementById('btnPlay').click();
  }
}
let pjump=false;
let running=false,phase=1,score=0,hp=5;
let maxPhase=1; // highest phase unlocked
let selectedPhase=1; // phase chosen in selector
let paused=false;
let nukeFlash=0;
let player,bullets,aliens,particles,platforms,bgStars=[];
let sCD=0,inv=false,invT=0,spawnT=0,spawnI=180,phaseOver=false;
let killed=0,killGoal=0,totalSpawned=0;
let phaseTries=3;
let coins=0,robotColor='#4488cc',selectedWeapon=0;
let ownedWeapons=[0]; // indices of owned weapons
let frameT=0;
// ─── BOSS STATE ───
let bossPhase10=0; // 0=normal, 1=drones, 2=boss, 3=dead
let boss=null;     // boss object
let bossKillCount=0; // small aliens killed in phase 10
let victoryScene=0;  // 0=off, 1=black, 2=celebration, 3=certificate
let victoryT=0;
let fireworks=[];
let audienceY=0;
let bossBullets=[];
let victoryPending=0;

// ═══════════════════════════════════════════════════════════════════
// ─── AUDIO ENGINE (Web Audio API, synth, no external files) ──────
// ═══════════════════════════════════════════════════════════════════
let audioCtx = null;
let musicVolume = 0.35;
let sfxVolume = 0.4;
let audioEnabled = true;
// Gain nodes for routing
let musicGainNode = null;
let sfxGainNode = null;

function initAudio(){
  if(audioCtx) return;
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    // Create master gain nodes
    musicGainNode = audioCtx.createGain();
    musicGainNode.gain.value = musicVolume;
    musicGainNode.connect(audioCtx.destination);
    sfxGainNode = audioCtx.createGain();
    sfxGainNode.gain.value = sfxVolume;
    sfxGainNode.connect(audioCtx.destination);
  }catch(e){audioEnabled=false;}
}

// Unlock audio on first user interaction (mobile req)
function unlockAudio(){
  initAudio();
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
}

function setMusicVolume(v){ musicVolume=v; if(musicGainNode) musicGainNode.gain.value=v; }
function setSfxVolume(v){ sfxVolume=v; if(sfxGainNode) sfxGainNode.gain.value=v; }

function playTone(freq, duration, type='square', volume=1, fadeOut=true){
  if(!audioEnabled||!audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    if(fadeOut){
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    }
    osc.connect(gain);
    gain.connect(sfxGainNode||audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }catch(e){}
}

function playNoise(duration, volume=1, filterFreq=1000){
  if(!audioEnabled||!audioCtx) return;
  try{
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type='lowpass'; filter.frequency.value=filterFreq;
    const gain = audioCtx.createGain();
    gain.gain.value = volume;
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    noise.connect(filter); filter.connect(gain); gain.connect(sfxGainNode||audioCtx.destination);
    noise.start(); noise.stop(audioCtx.currentTime + duration);
  }catch(e){}
}

function playFreqSweep(freqStart, freqEnd, duration, type='sawtooth', volume=1){
  if(!audioEnabled||!audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freqStart, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(sfxGainNode||audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════════════
// ─── PROCEDURAL ACTION MUSIC ─────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
let musicPlaying = false;
let musicTimer = null;
let musicStep = 0;
const BPM = 140;
const STEP_TIME = 60 / BPM / 4; // 16th note duration

// Note frequencies (A minor / action scale)
const N={
  C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,Bb3:233.08,B3:246.94,
  C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,Bb4:466.16,B4:493.88,
  C5:523.25,D5:587.33,E5:659.26
};

// Bass patterns (2 bars = 32 steps each)
const bassPat=[
  // Pattern A — driving Am
  [N.A3,0,0,N.A3, 0,0,N.A3,0, N.C4,0,0,N.C4, 0,0,N.G3,0,
   N.F3,0,0,N.F3, 0,0,N.F3,0, N.E3,0,0,N.E3, 0,N.E3,0,0],
  // Pattern B — tense Dm feel
  [N.D3,0,0,N.D3, 0,0,N.D3,0, N.F3,0,0,N.F3, 0,0,N.E3,0,
   N.A3,0,0,N.A3, 0,0,N.G3,0, N.F3,0,N.E3,0, N.D3,0,0,0],
  // Pattern C — build up
  [N.A3,0,N.A3,0, N.A3,0,N.A3,0, N.C4,0,N.C4,0, N.C4,0,N.C4,0,
   N.D4,0,N.D4,0, N.D4,0,N.D4,0, N.E4,0,N.E4,0, N.E4,0,0,0],
];

// Lead patterns (short melodic phrases)
const leadPat=[
  // Melody A — heroic
  [0,0,0,0, N.E5,0,N.D5,0, N.C5,0,0,N.A4, 0,0,0,0,
   0,0,0,0, N.C5,0,N.D5,0, N.E5,0,0,N.G4, 0,0,0,0],
  // Melody B — tension
  [0,0,0,0, N.A4,0,N.Bb4,0, N.A4,0,0,0, N.G4,0,N.F4,0,
   N.E4,0,0,0, 0,0,N.F4,0, N.E4,0,N.D4,0, 0,0,0,0],
  // Melody C — action riff
  [N.A4,0,N.C5,0, N.D5,0,0,N.C5, 0,N.A4,0,0, 0,0,0,0,
   N.G4,0,N.A4,0, N.C5,0,0,N.D5, 0,N.E5,0,0, 0,0,0,0],
];

// Drum pattern: 1=kick, 2=snare, 3=hihat, 4=open hat
const drumPat=[
  1,0,3,0, 0,3,2,0, 3,0,1,3, 0,3,2,0,
  1,0,3,0, 1,3,2,0, 3,0,1,3, 0,3,2,3,
];

let musicSection=0; // which bass/lead pattern combo

function musicNoteOn(freq, duration, type, vol, dest){
  if(!audioCtx||!dest) return;
  try{
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type=type;
    osc.frequency.value=freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+duration);
    osc.connect(g); g.connect(dest);
    osc.start(); osc.stop(audioCtx.currentTime+duration);
  }catch(e){}
}

function musicDrum(type, dest){
  if(!audioCtx||!dest) return;
  try{
    if(type===1){ // kick
      const osc=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      osc.type='sine';
      osc.frequency.setValueAtTime(150,audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(30,audioCtx.currentTime+0.12);
      g.gain.setValueAtTime(0.7,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);
      osc.connect(g);g.connect(dest);osc.start();osc.stop(audioCtx.currentTime+0.12);
    } else if(type===2){ // snare
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.08,audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
      const s=audioCtx.createBufferSource();s.buffer=buf;
      const f=audioCtx.createBiquadFilter();f.type='highpass';f.frequency.value=800;
      const g=audioCtx.createGain();
      g.gain.setValueAtTime(0.45,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.08);
      s.connect(f);f.connect(g);g.connect(dest);s.start();s.stop(audioCtx.currentTime+0.08);
      // tonal body
      const osc=audioCtx.createOscillator();osc.type='triangle';
      osc.frequency.setValueAtTime(200,audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80,audioCtx.currentTime+0.06);
      const g2=audioCtx.createGain();
      g2.gain.setValueAtTime(0.3,audioCtx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.06);
      osc.connect(g2);g2.connect(dest);osc.start();osc.stop(audioCtx.currentTime+0.06);
    } else if(type===3){ // closed hihat
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.03,audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
      const s=audioCtx.createBufferSource();s.buffer=buf;
      const f=audioCtx.createBiquadFilter();f.type='highpass';f.frequency.value=7000;
      const g=audioCtx.createGain();
      g.gain.setValueAtTime(0.2,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.03);
      s.connect(f);f.connect(g);g.connect(dest);s.start();s.stop(audioCtx.currentTime+0.03);
    } else if(type===4){ // open hat
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.1,audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
      const s=audioCtx.createBufferSource();s.buffer=buf;
      const f=audioCtx.createBiquadFilter();f.type='highpass';f.frequency.value=6000;
      const g=audioCtx.createGain();
      g.gain.setValueAtTime(0.25,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
      s.connect(f);f.connect(g);g.connect(dest);s.start();s.stop(audioCtx.currentTime+0.1);
    }
  }catch(e){}
}

function musicTick(){
  if(!musicPlaying||!audioCtx||!musicGainNode) return;
  const s=musicStep%32;
  const bp=bassPat[musicSection%bassPat.length];
  const lp=leadPat[musicSection%leadPat.length];
  const dp=drumPat[s%drumPat.length];
  // Bass
  if(bp[s]){
    musicNoteOn(bp[s], STEP_TIME*2.5, 'sawtooth', 0.35, musicGainNode);
    // sub bass
    musicNoteOn(bp[s]*0.5, STEP_TIME*2, 'sine', 0.25, musicGainNode);
  }
  // Lead (quieter, with slight detune for width)
  if(lp[s]){
    musicNoteOn(lp[s], STEP_TIME*2, 'square', 0.15, musicGainNode);
    musicNoteOn(lp[s]*1.003, STEP_TIME*1.8, 'square', 0.08, musicGainNode);
  }
  // Drums
  if(dp) musicDrum(dp, musicGainNode);

  musicStep++;
  // Change section every 2 bars (64 steps)
  if(musicStep%64===0) musicSection=(musicSection+1)%3;
}

function startMusic(){
  if(musicPlaying) return;
  if(!audioCtx) initAudio();
  if(!audioCtx) return;
  musicPlaying=true;
  musicStep=0;
  musicSection=0;
  musicTimer=setInterval(musicTick, STEP_TIME*1000);
}

function stopMusic(){
  musicPlaying=false;
  if(musicTimer){ clearInterval(musicTimer); musicTimer=null; }
}

function pauseMusic(){ musicPlaying=false; }
function resumeMusic(){ if(musicTimer) musicPlaying=true; }

// ─── GAME SOUND EFFECTS ───
const SFX = {
  shootPistol(){ playFreqSweep(800,300,0.08,'square',0.3); },
  shootMG(){ playTone(500+Math.random()*200,0.04,'square',0.2); playNoise(0.02,0.15,2000); },
  shootFire(){ playNoise(0.12,0.35,600); playFreqSweep(300,100,0.12,'sawtooth',0.15); },
  shootRay(){ playFreqSweep(1200,400,0.12,'sawtooth',0.25); },
  shootLava(){ playFreqSweep(200,80,0.2,'sawtooth',0.35); playNoise(0.15,0.2,400); },
  shootPlasma(){ playFreqSweep(900,200,0.15,'sine',0.3); playTone(1800,0.05,'triangle',0.2); },
  shootLaser(){ playFreqSweep(1800,800,0.06,'sine',0.2); playTone(2200,0.04,'square',0.15); playFreqSweep(1600,1000,0.08,'triangle',0.1); },
  shootMissile(){ playFreqSweep(300,150,0.15,'sawtooth',0.35); playNoise(0.2,0.25,500); setTimeout(()=>playFreqSweep(400,800,0.2,'sawtooth',0.15),50); },
  alienDie(type){
    const freqs={1:[400,100],2:[250,80],3:[300,60],4:[600,150],5:[200,50],6:[350,70],7:[500,120],8:[700,200],9:[500,150]};
    const f=freqs[type]||[400,100];
    playFreqSweep(f[0],f[1],0.18,'sawtooth',0.3);
    playNoise(0.1,0.2,800);
  },
  hit(){ playFreqSweep(200,60,0.25,'sawtooth',0.4); playNoise(0.15,0.3,300); },
  jump(){ playFreqSweep(300,600,0.1,'square',0.15); },
  combo(mult){
    const base = 600 + mult*150;
    playTone(base,0.06,'triangle',0.2);
    setTimeout(()=>playTone(base*1.25,0.06,'triangle',0.2),40);
  },
  powerup(){
    playTone(800,0.08,'triangle',0.3);
    setTimeout(()=>playTone(1200,0.08,'triangle',0.3),70);
    setTimeout(()=>playTone(1600,0.1,'triangle',0.3),140);
  },
  grenadeThrow(){ playFreqSweep(400,200,0.15,'triangle',0.2); },

// AdMob IDs - Alien Rush FX
const ADMOB_INTERSTITIAL_ID = 'ca-app-pub-6853379352980306/7292639991';
const ADMOB_REWARDED_ID     = 'ca-app-pub-6853379352980306/9657819580';

let adInterstitialReady = false;
let adRewardedReady = false;
let adRewardCallback = null;
// ── Anti-spam controls (FIX) ──
let admobInitialized = false;
let admobPrepareScheduled = { interstitial: false, rewarded: false };
let lastInterstitialTime = 0;
const INTERSTITIAL_COOLDOWN = 90000; // 90s mínimo entre interstitials

function admobInit(){
  if(admobInitialized) return; // ⛔ não inicializa duas vezes (DOMContentLoaded + deviceready)
  if(!window.Capacitor||!window.Capacitor.Plugins||!window.Capacitor.Plugins.AdMob) return;
  admobInitialized = true;
  const AdMob = window.Capacitor.Plugins.AdMob;
  AdMob.initialize({ initializeForTesting: false });
  admobPrepareInterstitial();
  admobPrepareRewarded();
  // Listeners registrados UMA VEZ só
  AdMob.addListener('interstitialAdLoaded',()=>{ adInterstitialReady=true; });
  AdMob.addListener('interstitialAdFailedToLoad',()=>{
    adInterstitialReady=false;
    if(admobPrepareScheduled.interstitial) return; // ⛔ já tem prepare agendado
    admobPrepareScheduled.interstitial = true;
    setTimeout(()=>{ admobPrepareScheduled.interstitial=false; admobPrepareInterstitial(); }, 60000);
  });
  AdMob.addListener('interstitialAdDismissed',()=>{
    adInterstitialReady=false;
    if(admobPrepareScheduled.interstitial) return;
    admobPrepareScheduled.interstitial = true;
    setTimeout(()=>{ admobPrepareScheduled.interstitial=false; admobPrepareInterstitial(); }, 5000);
  });
  AdMob.addListener('onRewardedVideoAdLoaded',()=>{ adRewardedReady=true; });
  AdMob.addListener('onRewardedVideoAdFailedToLoad',()=>{
    adRewardedReady=false;
    if(admobPrepareScheduled.rewarded) return;
    admobPrepareScheduled.rewarded = true;
    setTimeout(()=>{ admobPrepareScheduled.rewarded=false; admobPrepareRewarded(); }, 60000);
  });
  AdMob.addListener('onRewardedVideoAdDismissed',()=>{
    adRewardedReady=false;
    if(admobPrepareScheduled.rewarded) return;
    admobPrepareScheduled.rewarded = true;
    setTimeout(()=>{ admobPrepareScheduled.rewarded=false; admobPrepareRewarded(); }, 5000);
  });
  AdMob.addListener('onRewardedVideoAdReward',()=>{ if(adRewardCallback) adRewardCallback(); adRewardCallback=null; });
}

function admobPrepareInterstitial(){
  if(!window.Capacitor?.Plugins?.AdMob) return;
  window.Capacitor.Plugins.AdMob.prepareInterstitial({ adId: ADMOB_INTERSTITIAL_ID });
}

function admobPrepareRewarded(){
  if(!window.Capacitor?.Plugins?.AdMob) return;
  window.Capacitor.Plugins.AdMob.prepareRewardVideoAd({ adId: ADMOB_REWARDED_ID });
}

function admobShowInterstitial(){
  if(!window.Capacitor?.Plugins?.AdMob||!adInterstitialReady) return;
  // ⏱ frequency cap — 90s mínimo entre interstitials
  const now = Date.now();
  if(now - lastInterstitialTime < INTERSTITIAL_COOLDOWN) return;
  try {
    window.Capacitor.Plugins.AdMob.showInterstitial();
    lastInterstitialTime = now;
    adInterstitialReady=false;
  } catch(e){ console.warn('AdMob interstitial show failed', e); }
}

function admobShowRewarded(callback){
  if(!window.Capacitor?.Plugins?.AdMob||!adRewardedReady) return false;
  try {
    adRewardCallback=callback;
    window.Capacitor.Plugins.AdMob.showRewardVideoAd();
    adRewardedReady=false;
    return true;
  } catch(e){ console.warn('AdMob rewarded show failed', e); return false; }
}

const SAVE_KEY='alienrushfx_save';

function saveGame(){
  try{
    const data={coins,phase,maxPhase,selectedColor,selectedWeapon,ownedWeapons};
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));
  }catch(e){}
}

function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const d=JSON.parse(raw);
    if(d.coins!=null) coins=d.coins;
    if(d.phase!=null) phase=d.phase;
    if(d.maxPhase!=null) maxPhase=d.maxPhase;
    else maxPhase=phase; // backwards compat
    selectedPhase=phase;
    if(d.selectedColor!=null){ selectedColor=d.selectedColor; robotColor=COLORS[selectedColor].c; }
    if(d.selectedWeapon!=null) selectedWeapon=d.selectedWeapon;
    if(d.ownedWeapons!=null) ownedWeapons=d.ownedWeapons;
  }catch(e){}
}

function t(key,rep){
  const e=I18N[key]; if(!e) return key;
  let s=e[curLang]||e.en||e.pt;
  if(rep!=null) s=s.replace('%n',rep);
  return s;
}

function buildLobby(){
  // Colors
  const cg=document.getElementById('colorGrid');
  cg.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='color-opt'+(i===selectedColor?' selected':'');
    // Gemstone-style radial gradient with highlight
    d.style.background=`
      radial-gradient(ellipse at 30% 25%, ${c.c3} 0%, ${c.c} 35%, ${c.c2} 75%, ${c.c2} 100%)
    `;
    d.title=c.name;
    d.onclick=()=>{selectedColor=i;robotColor=c.c;document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');saveGame();};
    cg.appendChild(d);
  });
  // Weapons
  const wl=document.getElementById('weaponsList');
  wl.innerHTML='';
  WEAPONS.forEach((w,i)=>{
    const owned=ownedWeapons.includes(i);
    const affordable=!owned&&coins>=w.price&&phase>=w.unlockPhase;
    const locked=!owned&&phase<w.unlockPhase;
    const div=document.createElement('div');
    div.className='weapon-item'+(owned?' owned':'')+(locked?' locked':'')+(affordable?' affordable':'')+(i===selectedWeapon&&owned?' selected-weapon':'');
    const equippedBadge = owned&&i===selectedWeapon?`<span class="badge badge-equipped">${t('equipped')}</span>`:'';
    const statusText = owned
      ? (i===selectedWeapon ? '' : t('equip'))
      : (locked ? `🔒 ${t('stageWord')} ${w.unlockPhase}` : `${w.price} FX`);
    const priceClass = owned ? 'owned-label' : (w.price===0?'free':'');
    div.innerHTML=`
      <div class="weapon-icon">${w.icon}</div>
      <div class="weapon-info">
        <div class="weapon-name">${wName(i)}</div>
        ${equippedBadge || `<div class="weapon-price ${priceClass}">${statusText}</div>`}
      </div>
      <svg class="weapon-visual" viewBox="0 0 78 36">
        ${weaponSvg(i,w.color)}
      </svg>
    `;
    if(owned){
      div.onclick=()=>{selectedWeapon=i;buildLobby();};
    } else if(affordable){
      const btn=document.createElement('button');
      btn.className='btn-buy';btn.textContent=t('buy');
      btn.onclick=(e)=>{e.stopPropagation();if(coins>=w.price){coins-=w.price;ownedWeapons.push(i);selectedWeapon=i;buildLobby();updateCoinDisplay();}};
      div.appendChild(btn);
    }
    // Ad button to test locked weapon for 1 phase
    if(!owned&&locked){
      const adBtn2=document.createElement('button');
      adBtn2.className='btn-buy';
      adBtn2.style.cssText='background:linear-gradient(90deg,#2a6600,#44aa00);border-color:#88ff00;font-size:9px;margin-top:4px;';
      adBtn2.textContent='🎬 '+t('adTestWeapon');
      adBtn2.onclick=(e)=>{e.stopPropagation();watchAdTestWeapon(i);};
      div.appendChild(adBtn2);
    }
    wl.appendChild(div);
  });
  // Phase selector
  const cfg=PHASE_CFG[Math.min(selectedPhase-1,14)];
  const phasePct = (maxPhase/15)*100;
  let phaseGrid='<div class="phase-grid">';
  for(let p=1;p<=15;p++){
    const unlocked=p<=maxPhase;
    const sel=p===selectedPhase;
    const cls=sel?'phase-btn selected':unlocked?'phase-btn unlocked':'phase-btn locked';
    phaseGrid+=`<div class="${cls}" ${unlocked?`onclick="selectPhase(${p})"`:''}>${unlocked?p:'🔒'}</div>`;
  }
  phaseGrid+='</div>';
  document.getElementById('phaseInfoBox').innerHTML=`
    <div class="progress-info">
      ${phaseGrid}
      <div class="phase-bar"><div class="phase-bar-fill" style="width:${phasePct}%"></div></div>
      <div class="progress-row">
        <span class="lbl">${t('scenario')}</span>
        <span class="val" style="color:#7ad8ff;font-size:10px;">${pDesc(Math.min(selectedPhase-1,14))}</span>
      </div>
      <div class="progress-row">
        <span class="lbl">${t('killsNeeded')}</span>
        <span class="val" style="color:#ff8888;">${cfg.kills}</span>
      </div>
      <div class="progress-row">
        <span class="lbl">${t('phaseBonus')}</span>
        <span class="val" style="color:#ffd700;">+${cfg.bonus} 🪙</span>
      </div>
    </div>`;
  document.getElementById('phaseNum').textContent=selectedPhase;
  updateCoinDisplay();
  // Pre-phase bonus ads
  const ppAds=document.getElementById('prephaseAds');
  if(ppAds) ppAds.style.display='flex';
  // Gamepad status
  updateGamepadStatus();
}

function updateGamepadStatus(){
  const el=document.getElementById('gamepadStatus');
  if(!el) return;
  let gamepads;
  try{ gamepads=navigator.getGamepads?navigator.getGamepads():[]; }catch(e){ el.className='gamepad-status'; el.textContent='🎮 '+t('gpNone'); return; }
  let gp=null;
  for(const g of gamepads){ if(g&&g.connected){gp=g;break;} }
  if(gp){
    el.className='gamepad-status connected';
    el.innerHTML='🎮 '+gp.id.slice(0,25)+'<div class="gp-map">A='+t('gpJump')+' B='+t('gpShoot')+' X='+t('gpShootUp')+' Y='+t('gpGrenade')+'</div>';
  } else {
    el.className='gamepad-status';
    el.textContent='🎮 '+t('gpNone');
  }
}

(function setupJoystick(){
  const base=document.getElementById('joystick');
  const stick=document.getElementById('joystickStick');
  if(!base||!stick) return;
  let active=false, pid=null;
  const maxR=27;          // raio máximo de deslocamento do stick (px)
  const deadzone=0.28;    // zona morta pra não andar com toque mínimo

  function setFromEvent(e){
    const rect=base.getBoundingClientRect();
    const cxp=rect.left+rect.width/2;
    const cyp=rect.top+rect.height/2;
    let dx=e.clientX-cxp;
    let dy=e.clientY-cyp;
    const dist=Math.hypot(dx,dy)||1;
    const clamped=Math.min(dist,maxR);
    const nx=(dx/dist), ny=(dy/dist);
    // posiciona o stick visualmente
    stick.style.transform=`translate(${nx*clamped}px,${ny*clamped}px)`;
    // normaliza -1..1
    const hx=(nx*clamped)/maxR;
    const hy=(ny*clamped)/maxR;
    inp.left  = hx < -deadzone;
    inp.right = hx >  deadzone;
    inp.crouch= hy >  deadzone; // empurrar pra baixo = agachar
  }
  function reset(){
    stick.style.transform='translate(0px,0px)';
    inp.left=false; inp.right=false; inp.crouch=false;
  }
  base.addEventListener('pointerdown',e=>{
    e.preventDefault(); active=true; pid=e.pointerId;
    base.setPointerCapture(pid);
    setFromEvent(e);
  });
  base.addEventListener('pointermove',e=>{
    if(!active||e.pointerId!==pid) return;
    e.preventDefault(); setFromEvent(e);
  });
  base.addEventListener('pointerup',e=>{
    if(e.pointerId!==pid) return;
    active=false; pid=null; reset();
  });
  base.addEventListener('pointercancel',e=>{
    active=false; pid=null; reset();
  });
  base.addEventListener('lostpointercapture',()=>{
    active=false; pid=null; reset();
  });
})();

  if(p===15){bossPhase10=1;}

function buildPlatforms(p){
  // Generate an infinite-style platform track using procedural placement
  // Start further right to give player breathing room
  const out=[];
  let x=300;  // first platform starts here
  const count=40; // generate enough for a long fase
  const rng=((p*73+17)%100)/100; // deterministic seed per phase
  for(let i=0;i<count;i++){
    const gap=120+Math.random()*80;
    x+=gap;
    const h1=[60,90,120,150,170,200];
    const layer=Math.floor(Math.random()*(Math.min(p+2,5)));
    const y=GND-h1[Math.min(layer,5)];
    const w=55+Math.random()*40;
    out.push({x:x,y:y,w:w,h:10});
    // chance for second platform at different height
    if(Math.random()<0.4&&i<count-1){
      x+=60;
      const y2=GND-h1[Math.min(Math.floor(Math.random()*5),5)];
      out.push({x:x,y:y2,w:45+Math.random()*30,h:10});
    }
  }
  return out;
}
