function spawnA(type){
  if(aliens.length>=MAX_ALIENS) return;
  totalSpawned++;
  const x=W+20;
  const spds=[0,1.8+Math.random()*.8,2.2+Math.random()*.8,2.8+Math.random()*.6,3.2+Math.random()*.6,3.8+Math.random()*.8,
    1.2+Math.random()*.4, // 6=turret (slow)
    3.5+Math.random()*.8, // 7=ufo
    2.0+Math.random()*.6, // 8=phantom (erratic)
    1.5+Math.random()*.4, // 9=charger (slow until aggro)
  ];
  // Phase-based speed multiplier (gradual)
  const spdMult = phase<=6?1.0 : phase<=9?1.1 : phase<=12?1.2 : 1.35;
  const spd=-(spds[Math.min(type,9)]*spdMult);
  let y=GND-32;
  const fly=type===4||type===5||type===7;
  if(fly) y=50+Math.random()*140;
  else if(type!==2&&type!==6&&Math.random()<0.3&&platforms.length){
    const candidates=platforms.filter(pl=>pl.x>W*0.4);
    if(candidates.length){
      const pl=candidates[Math.floor(Math.random()*candidates.length)];y=pl.y-32;
    }
  }
  const isGold=Math.random()<0.025;
  const hpMap=[0,1,1,1,2,2,3,2,3,1];
  let hp=isGold?4:hpMap[Math.min(type,9)]||1;
  // Phase-based HP bonus (gradual)
  if(phase>=12) hp+=1;
  if(phase>=14) hp+=1;
  if(isGold) hp+=Math.floor(phase/5);
  aliens.push({x,y,w:26,h:26,vx:spd,vy:0,type,hp,fr:0,ft:0,gr:fly,jt:60+Math.random()*80,floatT:Math.random()*Math.PI*2,flash:0,isGold:isGold,shootT:Math.floor(Math.random()*40),phaseT:Math.random()*200|0});
}

// ─── SHOOT ────────────────────────────────────────────────────────────────────
function shoot(upward){
  if(!running||sCD>0) return;
  const w=WEAPONS[selectedWeapon];
  const rapid=activePowerup&&activePowerup.type==='rapid';
  sCD=rapid?Math.max(2,Math.floor(w.cooldown*0.4)):w.cooldown;
  const bx=player.x+(player.dir>0?22:0);
  const by=player.y+(player.crouching?24:14);
  const diag=upward||inp.shootUp;
  const n=w.multi||1;
  for(let m=0;m<n;m++){
    // plasma triple: wider spread
    let oy=0;
    if(n===3){oy=(m-1)*5;}
    else if(n===2){oy=(m===0?-4:4);}
    // machinegun spread
    const spread=w.spread?(Math.random()-0.5)*w.spread:0;
    // diagonal: vx reduced, vy upward
    let vx=diag?player.dir*w.speed*0.7:player.dir*w.speed;
    let vy=diag?-w.speed*0.7:0;
    // apply spread to vy
    vy+=spread*w.speed;
    if(n>1) vy+=(m-(n-1)/2)*0.8;
    bullets.push({
      x:bx,y:by+oy,vx,vy,
      col:w.color,size:w.size,
      pierce:w.pierce||false,
      weapon:selectedWeapon,diag,
      dmg:w.dmg||1,
      burn:w.burn||false,
      explode:w.explode||false,
      homing:w.homing||false,
      knockback:w.knockback||false,
      hitIds:w.pierce?new Set():null
    });
  }
  // SOUND
  const sounds=[SFX.shootPistol,SFX.shootMG,SFX.shootFire,SFX.shootRay,SFX.shootLava,SFX.shootPlasma,SFX.shootLaser,SFX.shootMissile];
  if(sounds[selectedWeapon]) sounds[selectedWeapon]();
  // muzzle flash (bigger for lava/plasma)
  const flashN=w.explode?4:w.knockback?3:2;
  burst(bx+(player.dir>0?4:-4),by,w.color,flashN);
  // shake for heavy weapons
  if(w.explode) triggerShake(3);
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function burst(x,y,col,n){
  // Cap particles per burst for perf
  const cap=Math.min(n,5);
  for(let i=0;i<cap;i++) particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:15+Math.random()*10,col,size:2+Math.random()*2});
}

function landOn(obj,pl){return obj.vy>=0&&obj.x+obj.w>pl.x&&obj.x<pl.x+pl.w&&obj.y+obj.h>pl.y&&obj.y+obj.h<pl.y+14;}
function colRect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}



// ─── GRENADE FUNCTIONS ───
function updateAmmoDisplay(){
  const el=document.getElementById('ammoDisplay');
  if(el) el.textContent=grenadeAmmo;
}

function throwGrenade(){
  if(!running||grenadeAmmo<=0) return;
  grenadeAmmo--;
  updateAmmoDisplay();
  const gx=player.x+11+(player.dir>0?10:-10);
  const gy=player.y+10;
  grenades.push({
    x:gx,y:gy,
    vx:player.dir*6+(Math.random()-0.5),
    vy:-8,
    fuse:60,         // 1 second fuse
    bounces:0,
    rot:0
  });
  burst(gx,gy,'#ff8800',6);
  triggerShake(2);
  SFX.grenadeThrow();
}

function detonate(x,y){
  // Big explosion — knock all aliens in radius
  const radius=90;
  explosions.push({x,y,r:0,maxR:radius,life:40,maxLife:40});
  screenFlash=25; // white flash
  triggerShake(18);
  triggerHitstop(4);
  SFX.explosion();

  // Damage aliens in range
  for(let ai=aliens.length-1;ai>=0;ai--){
    const a=aliens[ai];
    const dx=a.x+13-x, dy=a.y+13-y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<radius){
      if(a.type===2&&a.hp>2){
        // Red immunes take partial damage
        a.hp-=2;a.flash=10;
      } else {
        // Full kill for most aliens
        const wasGold=a.isGold;
        const pts=[0,10,15,30,50,80,100,120,60,12];
        const coinEarn=[0,5,7,12,18,25,30,35,20,6];
        const mult=comboMultiplier();
        let pt=pts[Math.min(a.type,9)]*mult;
        let cn=coinEarn[Math.min(a.type,9)]*mult;
        if(wasGold){pt+=200;cn+=500;}
        score+=pt;coins+=cn;
        killed++;addCombo();
        if(phase===15) bossKillCount++;
        // knockback
        a.vx=Math.sign(dx||1)*8;
        a.vy=-6-Math.random()*3;
        // float text
        floatText('+'+pt,a.x+13,a.y,'#ff8800');
        aliens.splice(ai,1);
      }
    }
  }
  // Damage boss too
  if(boss&&bossPhase10===3){
    const dx=boss.x+boss.w/2-x, dy=boss.y+boss.h/2-y;
    if(Math.sqrt(dx*dx+dy*dy)<radius+40){
      boss.hp-=4; boss.flash=14;
      floatText('-4 HP',boss.x+boss.w/2,boss.y-10,'#ff8800');
      if(boss.hp<=0&&boss){
        const bx3=boss.x+boss.w/2,by3=boss.y+boss.h/2;
        bossPhase10=4;boss=null;phaseOver=true;
        score+=5000; coins+=1000; updateCoinDisplay();
        for(let p2=0;p2<40;p2++) particles.push({x:bx3,y:by3,vx:(Math.random()-.5)*18,vy:(Math.random()-.5)*18,life:40+Math.random()*30,col:['#ff4400','#ffaa00','#ff0000','#ffff00'][Math.floor(Math.random()*4)],size:5+Math.random()*6});
        victoryPending=36;
        SFX.bossDie();
        aliens=[];bossBullets=[];bullets=[];
      }
    }
  }

  // Particles — lots!
  for(let i=0;i<24;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=4+Math.random()*12;
    particles.push({
      x,y,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd,
      life:25+Math.random()*20,
      col:['#ffaa00','#ff4400','#ffff00','#ffffff','#ff6600'][Math.floor(Math.random()*5)],
      size:3+Math.random()*4
    });
  }
  // Smoke particles (slower)
  for(let i=0;i<8;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=1+Math.random()*3;
    particles.push({
      x,y,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd-1,
      life:40+Math.random()*20,
      col:'#444',
      size:5+Math.random()*5
    });
  }
  updateCoinDisplay();
}

// ─── JUICE HELPERS ───
function triggerShake(amount){shakeT=Math.min(20,Math.max(shakeT,amount));}
function triggerHitstop(frames){hitstop=Math.min(8,Math.max(hitstop,frames));}
function addCombo(){
  combo++;
  comboT=COMBO_TIME;
  if(combo===3||combo===6||combo===10||combo===20) SFX.combo(comboMultiplier());
}
function comboMultiplier(){
  if(combo<3) return 1;
  if(combo<6) return 2;
  if(combo<10) return 3;
  if(combo<20) return 4;
  return 5;
}
function spawnPowerup(x,y){
  // 15% base chance, boosted a bit for higher-tier aliens
  const types=[
    {type:'shield',color:'#00aaff',weight:3},
    {type:'rapid',color:'#ffff00',weight:3},
    {type:'damage',color:'#ff4444',weight:2},
    {type:'coins',color:'#ffd700',weight:4},
    {type:'heal',color:'#ff69b4',weight:1},
    {type:'grenade',color:'#ff8800',weight:3},
    {type:'nuke',color:'#ff0044',weight:0.4},
  ];
  const total=types.reduce((s,t)=>s+t.weight,0);
  let r=Math.random()*total;
  let pick=types[0];
  for(const t of types){r-=t.weight;if(r<=0){pick=t;break;}}
  powerups.push({
    x,y,vx:(Math.random()-0.5)*3,vy:-4-Math.random()*2,
    type:pick.type,color:pick.color,
    life:600 // 10s lifespan
  });
}
function applyPowerup(type){
  SFX.powerup();
  if(type==='shield'){activePowerup={type:'shield',time:300,label:'🛡 ESCUDO'};inv=true;invT=Math.max(invT,300);}
  else if(type==='rapid'){activePowerup={type:'rapid',time:480,label:'⚡ RAPID FIRE'};}
  else if(type==='damage'){activePowerup={type:'damage',time:360,label:'💥 DANO X3'};}
  else if(type==='coins'){coins+=50;updateCoinDisplay();floatText('+50 FX',player.x+11,player.y-10,'#ffd700');SFX.coin();}
  else if(type==='heal'){hp=Math.min(5,hp+1);floatText('+1 HP',player.x+11,player.y-10,'#ff69b4');}
  else if(type==='grenade'){grenadeAmmo=Math.min(9,grenadeAmmo+2);updateAmmoDisplay();floatText('💣 +2',player.x+11,player.y-10,'#ff8800');}
  else if(type==='nuke'){
    // MEGA BLAST — kill all aliens except Immune/Mutant!
    SFX.explosion();
    setTimeout(()=>SFX.explosion(),150);
    setTimeout(()=>SFX.explosion(),300);
    triggerShake(15);
    let nukeKills=0;
    for(const a of aliens){
      if(a.type===2) continue; // immune/mutant survives
      nukeKills++;
      const pts=[0,10,15,30,50,80,100,120,60,12];
      const coinEarn=[0,5,7,12,18,25,30,35,20,6];
      score+=pts[Math.min(a.type,9)]*2;
      coins+=coinEarn[Math.min(a.type,9)]*2;
      killed++;
      if(phase===15) bossKillCount++;
      for(let p2=0;p2<8;p2++){
        particles.push({x:a.x+13,y:a.y+12,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,life:30+Math.random()*20,col:['#ff0','#f80','#f00','#fff'][Math.floor(Math.random()*4)],size:3+Math.random()*4});
      }
    }
    aliens=aliens.filter(a=>a.type===2);
    bossBullets=[];
    updateCoinDisplay();
    floatText('💥 MEGA BLAST! x'+nukeKills,player.x,player.y-30,'#ff0044');
    nukeFlash=20;
  }
}
// Floating text (for feedback)
let floatTexts=[];
function floatText(txt,x,y,col){floatTexts.push({txt,x,y,col,life:60});}

// Golden alien spawn — 0.5% chance per spawn, worth 500 coins
function maybeSpawnGolden(){
  if(Math.random()<0.02){
    // Replace last spawn with gold
    const a=aliens[aliens.length-1];
    if(a){a.isGold=true;a.hp=2;}
  }
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update(){
  // VICTORY TRANSITION COUNTDOWN — runs even when phaseOver (must be BEFORE guard)
  if(victoryPending>0){
    victoryPending--;
    if(victoryPending<=0&&victoryScene===0){
      startVictoryScene();
      return;
    }
  }
  // During boss fight, phaseOver is temporarily true while boss is alive — keep running
  const bossActive=phase===15&&bossPhase10===3&&boss!==null;
  if(!running||(phaseOver&&!bossActive)) return;
  frameT++;
  // ─── JUICE UPDATE ───
  if(hitstop>0){hitstop--;return;} // freeze frame
  if(shakeT>0){
    shakeT--;
    shakeX=(Math.random()-0.5)*shakeT*0.8;
    shakeY=(Math.random()-0.5)*shakeT*0.8;
  } else {shakeX=0;shakeY=0;}
  if(slowmo>0) slowmo--;
  const slowFactor=slowmo>0?0.35:1;
  if(comboT>0){
    comboT--;
    if(comboT<=0) combo=0;
  }
  // Active powerup countdown
  if(activePowerup){
    activePowerup.time--;
    if(activePowerup.time<=0) activePowerup=null;
  }
  // Powerup physics (falling)
  for(const pw of powerups){
    pw.vy+=0.25;pw.x+=pw.vx;pw.y+=pw.vy;
    if(pw.y+14>=GND){pw.y=GND-14;pw.vy*=-0.3;pw.vx*=0.85;}
    pw.life--;
  }
  powerups=powerups.filter(p=>p.life>0&&p.x>-50&&p.x<W+50);
  if(powerups.length>15) powerups=powerups.slice(-15);
  // Pickup powerups
  for(let pi=powerups.length-1;pi>=0;pi--){
    const pw=powerups[pi];
    if(Math.abs(pw.x-(player.x+11))<20&&Math.abs(pw.y-(player.y+16))<24){
      applyPowerup(pw.type);
      powerups.splice(pi,1);
      burst(pw.x,pw.y,pw.color,12);
    }
  }
  // ─── GRENADE UPDATE ───
  for(const g of grenades){
    g.vy+=0.4;
    g.x+=g.vx; g.y+=g.vy;
    g.rot+=0.3;
    g.fuse--;
    // Ground bounce
    if(g.y>=GND-6){
      g.y=GND-6;
      g.vy*=-0.5;
      g.vx*=0.7;
      g.bounces++;
    }
    // Platform bounce
    for(const pl of platforms){
      if(g.x>pl.x&&g.x<pl.x+pl.w&&g.y>pl.y&&g.y<pl.y+pl.h+10&&g.vy>0){
        g.y=pl.y-6;g.vy*=-0.5;g.vx*=0.7;g.bounces++;
      }
    }
    // wall bounce
    if(g.x<4){g.x=4;g.vx*=-0.6;}
    if(g.x>W-4){g.x=W-4;g.vx*=-0.6;}
  }
  // Detonate expired grenades
  for(let gi=grenades.length-1;gi>=0;gi--){
    if(grenades[gi].fuse<=0){
      detonate(grenades[gi].x,grenades[gi].y);
      grenades.splice(gi,1);
    }
  }
  // Update explosions
  for(const ex of explosions){
    ex.life--;
    ex.r=ex.maxR*(1-Math.pow(1-((ex.maxLife-ex.life)/ex.maxLife),3));
  }
  explosions=explosions.filter(e=>e.life>0);
  // Screen flash fade
  if(screenFlash>0) screenFlash--;

  // AUTO-SCROLL — move world left (pause during boss fight)
  const scrollActive=!(phase===15&&bossPhase10>=3)&&!phaseOver;
  if(scrollActive){
    scrollX+=SCROLL_SPEED;
    // move platforms left
    for(const pl of platforms){pl.x-=SCROLL_SPEED;}
    // remove off-screen platforms (left), add new ones on right
    platforms=platforms.filter(pl=>pl.x+pl.w>-50);
    // ensure there are always platforms ahead
    let rightMost=0;
    for(const pl of platforms) if(pl.x+pl.w>rightMost) rightMost=pl.x+pl.w;
    while(rightMost<W+400){
      const gap=120+Math.random()*80;
      rightMost+=gap;
      const h1=[60,90,120,150,170,200];
      const y=GND-h1[Math.floor(Math.random()*6)];
      const w=55+Math.random()*40;
      platforms.push({x:rightMost,y:y,w:w,h:10});
      rightMost+=w;
      if(Math.random()<0.3){
        const gap2=50+Math.random()*40;
        rightMost+=gap2;
        const y2=GND-h1[Math.floor(Math.random()*6)];
        const w2=45+Math.random()*30;
        platforms.push({x:rightMost,y:y2,w:w2,h:10});
        rightMost+=w2;
      }
    }
    // also push aliens/bullets left so they scroll with world
    // aliens DO NOT scroll — they stay where they spawned and move by their own velocity
    for(const pw of powerups) pw.x-=SCROLL_SPEED;
    for(const g of grenades) g.x-=SCROLL_SPEED;
    for(const ex of explosions) ex.x-=SCROLL_SPEED;
    for(const b of bullets) b.x-=SCROLL_SPEED*0.3; // bullets only slightly affected
    for(const bb of bossBullets) bb.x-=SCROLL_SPEED*0.3;
  }
  // Push player right with scroll when near left edge
  if(scrollActive&&player.x<10){
    player.x+=SCROLL_SPEED;
  }
  // Clamp to left edge
  if(player.x<0){player.x=0;if(player.vx<0)player.vx=0;}
  const spd=3.8;
  if(inp.left){player.vx=-spd;player.dir=-1;}
  else if(inp.right){player.vx=spd;player.dir=1;}
  else player.vx*=0.6;
  if(inp.jump&&!pjump&&player.gr){player.vy=-10.5;player.gr=false;}
  pjump=inp.jump;
  player.vy+=0.5;player.x+=player.vx;player.y+=player.vy;
  player.x=Math.max(0,Math.min(W-player.w,player.x));
  player.gr=false;
  if(player.y+player.h>=GND){player.y=GND-player.h;player.vy=0;player.gr=true;}
  for(const pl of platforms){if(landOn(player,pl)){player.y=pl.y-player.h;player.vy=0;player.gr=true;}}
  player.crouching=inp.crouch&&player.gr;
  player.ft++;if(player.ft>8){player.fr=(player.fr+1)%4;player.ft=0;}
  if(sCD>0) sCD--;
  if(invT>0){invT--;if(invT<=0)inv=false;}

  // bullets
  for(const b of bullets){
    // Homing (raio) — slight steering toward nearest alien
    if(b.homing){
      let tgt=null,minD=200;
      for(const a of aliens){
        const dx=a.x+13-b.x,dy=a.y+13-b.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<minD&&((b.vx>0&&dx>0)||(b.vx<0&&dx<0))){minD=d;tgt=a;}
      }
      if(tgt){
        const dx=tgt.x+13-b.x,dy=tgt.y+13-b.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        b.vy+=(dy/d)*0.7;
        // clamp vy
        if(Math.abs(b.vy)>8) b.vy=Math.sign(b.vy)*8;
      }
    }
    b.x+=b.vx;if(b.vy)b.y+=b.vy;
  }
  bullets=bullets.filter(b=>b.x>-30&&b.x<W+30&&b.y>-20&&b.y<H+20);

  // spawn
  spawnT++;
  // Spawn based on kills remaining, not total spawned — so escaped aliens get replaced
  const _remaining = killGoal - killed;
  const _spawnOk = phase===15
    ? (bossPhase10===1&&aliens.length<MAX_ALIENS&&bossKillCount+aliens.length<30)
    : (!phaseOver&&spawnT>=spawnI&&aliens.length<MAX_ALIENS&&aliens.length<_remaining);
  // Spawn faster when screen is empty
  const _emptyBoost = aliens.length===0 ? 0.3 : 1.0;
  if(_spawnOk&&spawnT>=spawnI*_emptyBoost){
    spawnT=0;
    const cfg=PHASE_CFG[Math.min(phase-1,14)];
    const t=cfg.spawnTypes;
    spawnA(t[Math.floor(Math.random()*t.length)]);
    // Double spawn burst — gradual increase
    const burstChance = phase>=15?0.45 : phase>=10?0.22 : phase>=7?0.30 : 0.22;
    if(Math.random()<burstChance&&aliens.length<MAX_ALIENS-1){
      setTimeout(()=>{if(running)spawnA(t[Math.floor(Math.random()*t.length)]);},150);
    }
    // Triple spawn burst (only phase 7+)
    const tripleChance = phase>=15?0.18 : phase>=10?0.04 : phase>=7?0.06 : 0;
    if(tripleChance>0&&Math.random()<tripleChance&&aliens.length<MAX_ALIENS-2){
      setTimeout(()=>{if(running)spawnA(t[Math.floor(Math.random()*t.length)]);},320);
    }
  }

  // alien update
  for(const a of aliens){
    if(a.flash>0) a.flash--;
    // Burn DoT
    if(a.burnT>0){
      a.burnT--;
      a.burnTick=(a.burnTick||0)+1;
      if(a.burnTick>=30){
        a.burnTick=0;
        a.hp--;
        a.flash=5;
        particles.push({x:a.x+13,y:a.y-4,vx:(Math.random()-0.5)*2,vy:-2-Math.random()*2,life:25,col:'#ff6600',size:3});
      }
    }
    const flying=a.type===4||a.type===5||a.type===7;
    // Once alien enters battle zone (x<W-60), stop advancing left and start patrolling
    if(a.x<W-60&&a.vx<0&&!a.inZone){
      a.inZone=true;
      // Phantom: keep full speed and go all the way across
      if(a.type===8){
        a.vx=-Math.abs(a.vx);
      } else {
        a.vx=(Math.random()<0.5?-1:1)*Math.abs(a.vx)*0.6; // slower patrol
      }
    }
    if(flying){
      a.floatT+=0.04;
      a.y+=Math.sin(a.floatT)*1.4;
      a.x+=a.vx;
      // bounce at screen edges once in zone
      if(a.inZone&&(a.x<=20||a.x>=W-a.w-20)) a.vx*=-1;
    } else {
      a.vy+=0.5;a.x+=a.vx;a.y+=a.vy;a.gr=false;
      if(a.y+a.h>=GND){a.y=GND-a.h;a.vy=0;a.gr=true;}
      for(const pl of platforms){if(landOn(a,pl)){a.y=pl.y-a.h;a.vy=0;a.gr=true;}}
      // bounce at screen edges once in zone
      if(a.inZone&&(a.x<=20||a.x>=W-a.w-20)) a.vx*=-1;
      if(a.type===2&&a.gr){
        const mutJump=phase>=10;
        a.jt--;
        if(a.jt<=0){
          a.vy=mutJump?-12:-9.5;
          a.jt=mutJump?(30+Math.random()*40):(50+Math.random()*70);
        }
      }
      // Phantom: fast erratic movement + jumps toward player
      if(a.type===8&&a.gr){
        a.jt--;
        if(a.jt<=0){
          const ph6=phase<=6;
          // 40% chance dash toward player (30% in phase 6)
          if(Math.random()<(ph6?0.25:0.4)){
            a.vx=player.x>a.x?(ph6?2.2:3.5):-(ph6?2.2:3.5);
          } else if(Math.random()<0.4){
            a.vx=-a.vx;
          }
          a.vx+=(Math.random()-0.5)*(ph6?2:3);
          a.vx=Math.max(ph6?-3.5:-5,Math.min(ph6?3.5:5,a.vx));
          if(Math.abs(a.vx)<1.5) a.vx=a.vx<0?-1.8:1.8;
          a.vy=ph6?(-5-Math.random()*3):(-7-Math.random()*4);
          a.jt=ph6?(30+Math.random()*40):(20+Math.random()*30);
        }
      }
      // Charger: walks slow, then DASHES when close to player
      if(a.type===9){
        const dx=player.x-a.x, dy=player.y-a.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<140&&!a.charging){
          a.charging=true;
          a.chargeT=0;
          a.vx=(dx>0?1:-1)*6.5;
          if(a.gr) a.vy=-4;
        }
        if(a.charging){
          a.chargeT=(a.chargeT||0)+1;
          if(a.chargeT>60){ a.charging=false; a.chargeT=0; a.vx*=0.3; }
        }
      }
    }
    a.ft++;if(a.ft>10){a.fr=(a.fr+1)%2;a.ft=0;}

    // ─── ALIEN SHOOTING (types 6 & 7) ───
    if(a.inZone&&!phaseOver){
      a.shootT=(a.shootT||0)+1;
      // Type 6 (Turret): shoots horizontally at player
      if(a.type===6){
        const fireRate=phase>=14?70:phase>=13?90:phase>=12?110:130;
        if(a.shootT>=fireRate){
          a.shootT=0;
          const dx=player.x-a.x, dy=player.y-a.y;
          const d=Math.sqrt(dx*dx+dy*dy)||1;
          const spd2=phase>=14?3.5:phase>=12?2.8:2.2;
          bossBullets.push({x:a.x+13,y:a.y+13,vx:(dx/d)*spd2,vy:(dy/d)*spd2,life:100});
          SFX.bossBullet();
        }
      }
      // Type 7 (UFO): drops bombs downward, rare aimed shot only in late phases
      if(a.type===7){
        const fireRate=phase>=14?60:phase>=13?80:phase>=12?100:120;
        if(a.shootT>=fireRate){
          a.shootT=0;
          if(phase>=13&&Math.random()<0.3){
            // Aimed shot at player (only phase 13+)
            const dx=player.x-a.x, dy=player.y-a.y;
            const d=Math.sqrt(dx*dx+dy*dy)||1;
            const spd2=phase>=14?3:2.5;
            bossBullets.push({x:a.x+13,y:a.y+20,vx:(dx/d)*spd2,vy:(dy/d)*spd2,life:90});
          } else {
            // Drop bomb straight down
            bossBullets.push({x:a.x+13,y:a.y+20,vx:0,vy:phase>=14?3:2.2,life:70});
          }
        }
      }
    }
  }
  // Remove aliens killed by burn (no combo bonus since it's passive DoT)
  for(let ai=aliens.length-1;ai>=0;ai--){
    const a=aliens[ai];
    if(a.hp<=0){
      if(a.type!==2){ // type 2 immune was already blocked before hit
        const pts=[0,10,15,30,50,80,100,120,60,12];
        const coinEarn=[0,5,7,12,18,25,30,35,20,6];
        score+=pts[Math.min(a.type,9)];
        coins+=coinEarn[Math.min(a.type,9)];
        killed++;
        addCombo();
        if(phase===15) bossKillCount++;
        triggerShake(4);
        floatText('🔥 BURN!',a.x+13,a.y,'#ff6600');
        if(Math.random()<0.15) spawnPowerup(a.x+13,a.y+10);
      }
      aliens.splice(ai,1);
      updateCoinDisplay();
    }
  }

  // bullet-alien collision
  outer:for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ai=aliens.length-1;ai>=0;ai--){
      const a=aliens[ai];
      if(b.x>a.x&&b.x<a.x+a.w&&b.y>a.y&&b.y<a.y+a.h){
        if(a.type===2){// immune to bullets
          burst(a.x+13,a.y+12,'#f44',4);
          if(!b.pierce) bullets.splice(bi,1);
          continue outer;
        }
        // Phantom: immune when invisible
        if(a.type===8&&!a._visible){
          burst(a.x+13,a.y+12,'rgba(100,180,255,0.3)',2);
          if(!b.pierce) bullets.splice(bi,1);
          continue outer;
        }
        // pierce check — don't hit same alien twice
        if(b.pierce&&b.hitIds){
          if(b.hitIds.has(a)) continue;
          b.hitIds.add(a);
        }
        const dmgMult=(activePowerup&&activePowerup.type==='damage')?3:1;
        const dmg=(b.dmg||1)*dmgMult;
        a.hp-=dmg;a.flash=8;
        // BURN: applies DoT for fire weapon
        if(b.burn){a.burnT=180;a.burnTick=0;}
        // KNOCKBACK: plasma pushes alien
        if(b.knockback){a.vx+=Math.sign(b.vx)*5;a.vy-=2;}
        // EXPLODE: lava area damage
        if(b.explode){
          for(let p2=0;p2<15;p2++) particles.push({x:a.x+13,y:a.y+12,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12,life:30+Math.random()*20,col:['#ff4400','#ffaa00','#ff0'][Math.floor(Math.random()*3)],size:3+Math.random()*3});
          // splash damage nearby — limit to 5 to prevent chain reactions
          let splashCount=0;
          for(const other of aliens){
            if(splashCount>=5) break;
            if(other===a) continue;
            const dx=other.x-a.x,dy=other.y-a.y;
            if(dx*dx+dy*dy<60*60){
              other.hp-=Math.ceil(dmg/2);
              other.flash=8;
              splashCount++;
            }
          }
          triggerShake(4);
        }
        const alienColors=['','#0f0','#f44','#c0f','#ffd700','#ff3300'];
        burst(a.x+13,a.y+12,alienColors[Math.min(a.type,9)],3);
        if(a.hp<=0){
          const pts=[0,10,15,30,50,80,100,120,60,12];
          const coinEarn=[0,5,7,12,18,25,30,35,20,6];
          const mult=comboMultiplier();
          let pt=pts[Math.min(a.type,9)]*mult;
          let cn=coinEarn[Math.min(a.type,9)]*mult;
          if(a.isGold){pt+=200;cn+=500;}
          score+=pt;coins+=cn;
          killed++;
          addCombo();
          if(phase===15) bossKillCount++;
          SFX.alienDie(a.type);
          if(a.isGold) SFX.coin();
          // JUICE: screen shake + hitstop
          triggerShake(a.isGold?14:6);
          triggerHitstop(a.isGold?4:1);
          // Floating score text
          floatText('+'+pt,a.x+13,a.y,mult>=3?'#ffaa00':'#ffff00');
          if(mult>=2) floatText('COMBO x'+mult,a.x+13,a.y-16,'#ff44ff');
          // Powerup drop (15% chance, 40% for gold)
          if(Math.random()<(a.isGold?0.8:0.15)) spawnPowerup(a.x+13,a.y+10);
          if(a.isGold){
            floatText('★ OURO ★',a.x+13,a.y-30,'#ffd700');
            grenadeAmmo=Math.min(9,grenadeAmmo+1);
            updateAmmoDisplay();
            floatText('💣 +1',a.x+13,a.y-46,'#ff8800');
          }
          aliens.splice(ai,1);
          updateCoinDisplay();
          // Slow-mo on last alien of phase (not phase 10)
          if(phase!==10&&killed===killGoal) slowmo=30;
        }
        if(!b.pierce) bullets.splice(bi,1);
        else continue; // pierce continues hitting
        continue outer;
      }
    }
  }

  // player-alien collision
  if(!inv){
    for(let ai=aliens.length-1;ai>=0;ai--){
      const a=aliens[ai];
      const hb={x:a.x+3,y:a.y+3,w:a.w-6,h:a.h-6};
      if(colRect(player,hb)){
        const stompable=a.type===2||a.type===4||a.type===5||a.type===7;
        if(stompable&&player.y+player.h<a.y+a.h*0.55){
          player.vy=-8;
          const pts=[0,0,15,0,50,80,100,120,60,12];const coinE=[0,0,7,0,18,25,30,35,20,6];
          score+=pts[Math.min(a.type,9)];coins+=coinE[Math.min(a.type,9)];
          killed++;
          if(phase===15) bossKillCount++;
          burst(a.x+13,a.y,'#ff0',8);
          aliens.splice(ai,1);updateCoinDisplay();
        } else hit();
        break;
      }
    }
  }

  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;}
  particles=particles.filter(p=>p.life>0);
  if(particles.length>80) particles=particles.slice(-80);
  aliens=aliens.filter(a=>a.x>-200&&a.x<W+200);
  // float texts
  for(const ft of floatTexts){ft.y-=1.2;ft.life--;}
  floatTexts=floatTexts.filter(ft=>ft.life>0);
  if(floatTexts.length>40) floatTexts=floatTexts.slice(-40);
  // Boss & alien bullets
  if(bossBullets.length>0){
    for(const bb of bossBullets){bb.x+=bb.vx;bb.y+=bb.vy;bb.life--;}
    bossBullets=bossBullets.filter(bb=>bb.life>0&&bb.x>0&&bb.x<W&&bb.y>0&&bb.y<H);
    if(bossBullets.length>40) bossBullets=bossBullets.slice(-40);
    if(!inv){
      for(let bi=bossBullets.length-1;bi>=0;bi--){
        const bb=bossBullets[bi];
        if(bb.x>player.x&&bb.x<player.x+player.w&&bb.y>player.y&&bb.y<player.y+player.h){
          bossBullets.splice(bi,1); hit(); break;
        }
      }
    }
  }

  // Phase 10 boss logic
  if(phase===15){
    if(bossPhase10===1&&bossKillCount>=30&&aliens.length===0){
      // Spawn 20 drones/mechs
      bossPhase10=2;
      for(let i=0;i<20;i++) setTimeout(()=>{
        if(running&&victoryScene===0)spawnA(i%2===0?5:4);
      },i*250);
    }
    // If phase 2 (drones) and any drone escaped, re-spawn to reach 10 total drones killed
    if(bossPhase10===2&&bossKillCount<50&&aliens.length===0&&!boss){
      const dronesSpawned = bossKillCount - 30;
      const dronesLeft = 20 - dronesSpawned;
      if(dronesLeft>0){
        for(let i=0;i<dronesLeft;i++) setTimeout(()=>spawnA(i%2===0?5:4),i*280);
      }
    }
    if(bossPhase10===2&&bossKillCount>=50&&aliens.length===0&&!boss){
      // Spawn MEGA BOSS — reset phaseOver so update keeps running
      bossPhase10=3;
      phaseOver=false;
      boss={
        x:W/2-40,y:GND-110,w:80,h:100,
        hp:35,maxHp:35,vx:3.8,vy:0,gr:false,
        flash:0,ft:0,fr:0,phase:0,
        atk:0,atkT:0,
        shootT:0,
        jumpT:0,
        summoned:{}
      };
      SFX.bossRoar();
    }
    // Boss update
    if(boss&&bossPhase10===3){
      boss.flash=Math.max(0,boss.flash-1);
      boss.vy+=0.5; // slightly stronger gravity
      // Cap velocities to prevent runaway
      if(boss.vy>16) boss.vy=16;
      if(boss.vy<-14) boss.vy=-14;
      if(Math.abs(boss.vx)>8) boss.vx=Math.sign(boss.vx)*8;
      boss.x+=boss.vx; boss.y+=boss.vy;
      // Floor
      if(boss.y+boss.h>=GND){boss.y=GND-boss.h;boss.vy=0;boss.gr=true;}
      // Ceiling - prevent boss from going above screen
      if(boss.y<0){boss.y=0;boss.vy=0;}
      // Walls - CLAMP position, not just reverse direction
      if(boss.x<=0){boss.x=0;boss.vx=Math.abs(boss.vx);}
      if(boss.x>=W-boss.w){boss.x=W-boss.w;boss.vx=-Math.abs(boss.vx);}
      // Speed scales with missing HP — gets faster as hurt
      const hpRatio = boss.hp/boss.maxHp;
      // SUMMON REINFORCEMENTS at HP milestones
      const thresholds = [0.75,0.5,0.25];
      // Only trigger ONE threshold per frame to prevent flood from big damage hits
      for(const th of thresholds){
        if(hpRatio<=th&&!boss.summoned[th]){
          boss.summoned[th]=true;
          // spawn 2 enemies as reinforcement — with strong guards
          for(let si=0;si<2;si++){
            const delay=si*400+300; // give at least 300ms for boss to survive
            setTimeout(()=>{
              // Double check boss still alive before spawning
              if(boss&&bossPhase10===3&&running&&victoryScene===0){
                spawnA(si===0?4:5);
              }
            },delay);
          }
          triggerShake(8);
          if(boss) floatText('⚠ REFORÇOS!',boss.x+boss.w/2,boss.y-50,'#ff00ff');
          break; // only one per frame
        }
      }
      const bossSpeedMult = hpRatio<=0.33 ? 1.5 : hpRatio<=0.66 ? 1.25 : 1.0;
      boss.vx = Math.sign(boss.vx||1) * 3.8 * bossSpeedMult;
      // Boss chases player horizontally sometimes
      if(Math.abs(boss.x+boss.w/2-(player.x+player.w/2))>60&&Math.random()<0.025){
        boss.vx = Math.sign(player.x-boss.x) * 3.8 * bossSpeedMult;
      }
      // Boss jumps occasionally
      boss.jumpT++;
      if(boss.gr&&boss.jumpT>80+Math.random()*50){
        boss.vy=-11; boss.jumpT=0;
      }
      // Shoot fireballs — faster at low HP, multiple shots
      boss.shootT++;
      const shootInterval = hpRatio<=0.25 ? 40 : hpRatio<=0.5 ? 60 : hpRatio<=0.75 ? 80 : 100;
      if(boss.shootT>=shootInterval){
        boss.shootT=0;
        const bx0=boss.x+boss.w/2, by0=boss.y+boss.h/2;
        const dx=(player.x+player.w/2)-bx0, dy=(player.y+player.h/2)-by0;
        const dist=Math.sqrt(dx*dx+dy*dy)||1;
        const spd=5+Math.random()*2;
        // Single shot at higher HP, spread of 3 at lower HP
        const shots = hpRatio<=0.25 ? 4 : hpRatio<=0.5 ? 3 : hpRatio<=0.75 ? 2 : 2;
        for(let si=0;si<shots;si++){
          const spread = (si-(shots-1)/2)*0.22;
          const ang=Math.atan2(dy,dx)+spread;
          bossBullets.push({x:bx0,y:by0,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:150});
          if(si===0) SFX.bossBullet();
        }
      }
      boss.atkT++;
      if(boss.atkT>120){boss.atkT=0;}
      boss.ft++;if(boss.ft>8){boss.fr=(boss.fr+1)%4;boss.ft=0;}
      // Boss bullet collision
      if(boss){
        for(let bi=bullets.length-1;bi>=0;bi--){
          if(!boss) break;
          const b=bullets[bi];
          if(b.x>boss.x&&b.x<boss.x+boss.w&&b.y>boss.y&&b.y<boss.y+boss.h){
            // pierce bullets: don't hit same boss twice per shot
            if(b.pierce&&b.hitBoss) continue;
            if(b.pierce) b.hitBoss=true;
            const bdmg=(b.dmg||1)*((activePowerup&&activePowerup.type==='damage')?3:1);
            boss.hp-=bdmg;boss.flash=12;
            const bx2=boss.x+boss.w/2,by2=boss.y+boss.h/2;
            for(let p2=0;p2<12;p2++) particles.push({x:bx2,y:by2,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,life:25+Math.random()*15,col:'#ff4400',size:4+Math.random()*4});
            if(!b.pierce) bullets.splice(bi,1);
            if(boss.hp<=0){
              bossPhase10=4;
              const bx3=boss.x+boss.w/2,by3=boss.y+boss.h/2;
              boss=null;
              phaseOver=true;
              score+=5000; coins+=1000; updateCoinDisplay();
              for(let p2=0;p2<40;p2++) particles.push({x:bx3,y:by3,vx:(Math.random()-.5)*18,vy:(Math.random()-.5)*18,life:40+Math.random()*30,col:['#ff4400','#ffaa00','#ff0000','#ffff00'][Math.floor(Math.random()*4)],size:5+Math.random()*6});
              victoryPending=36;
              SFX.bossDie();
              aliens=[];bossBullets=[];bullets=[];
              floatTexts=floatTexts.filter(ft=>ft.txt.includes('+')||ft.txt.includes('HP'));
            }
            break;
          }
        }
      }
      // Boss hits player — contact damage
      if(boss&&!inv){
        const bossHB={x:boss.x+8,y:boss.y+8,w:boss.w-16,h:boss.h-16};
        if(colRect(player,bossHB)){
          hit();
          // knockback player
          player.vx=(player.x<boss.x?-1:1)*8;
          player.vy=-6;
        }
      }
    }
  } else {
    if(!phaseOver&&killed>=killGoal&&aliens.length===0){
      phaseOver=true;
      const bonus=PHASE_CFG[Math.min(phase-1,14)].bonus;
      coins+=bonus;updateCoinDisplay();
      SFX.phaseClear();
      setTimeout(()=>showClear(bonus),400);
    }
  }
}

function hit(){
  hp--;inv=true;invT=90;
  SFX.hit();
  burst(player.x+11,player.y+16,'#f00',8);
  if(hp<=0){SFX.death();showDeath();}
}

// ─── OVERLAYS ─────────────────────────────────────────────────────────────────
function showOverlay(html){
  ov.innerHTML=html;ov.classList.add('show');
  document.getElementById('btnPause').classList.remove('show');
}
function hideOverlay(){ov.classList.remove('show');}

function togglePause(){
  if(!running&&!paused) return;
  paused=!paused;
  const pm=document.getElementById('pauseMenu');
  if(paused){
    running=false;
    pauseMusic();
    pm.classList.add('show');
    // Sync sliders with current values
    document.getElementById('sliderMusic').value=Math.round(musicVolume*100);
    document.getElementById('valMusic').textContent=Math.round(musicVolume*100)+'%';
    document.getElementById('sliderSfx').value=Math.round(sfxVolume*100);
    document.getElementById('valSfx').textContent=Math.round(sfxVolume*100)+'%';
  } else {
    pm.classList.remove('show');
    running=true;
    resumeMusic();
    if(!loopRunning) requestAnimationFrame(loop);
  }
}

function pauseToLobby(){
  paused=false;
  document.getElementById('pauseMenu').classList.remove('show');
  stopMusic();
  goLobby();
}

function onMusicSlider(v){
  const vol=parseInt(v)/100;
  setMusicVolume(vol);
  document.getElementById('valMusic').textContent=Math.round(vol*100)+'%';
  saveVolumes();
}
function onSfxSlider(v){
  const vol=parseInt(v)/100;
  setSfxVolume(vol);
  document.getElementById('valSfx').textContent=Math.round(vol*100)+'%';
  saveVolumes();
}
function saveVolumes(){
  try{ localStorage.setItem('alienrushfx_vol',JSON.stringify({m:musicVolume,s:sfxVolume})); }catch(e){}
}
function loadVolumes(){
  try{
    const raw=localStorage.getItem('alienrushfx_vol');
    if(!raw) return;
    const d=JSON.parse(raw);
    if(d.m!=null){ musicVolume=d.m; setMusicVolume(d.m); }
    if(d.s!=null){ sfxVolume=d.s; setSfxVolume(d.s); }
  }catch(e){}
}

function showDeath(){
  running=false;
  deathCount++;
  pauseMusic();
  clearTempWeapon();
  saveGame();

  const rewardBtn = true
    ? `<button onclick="watchAdRevive()" style="background:linear-gradient(90deg,#2a6600,#44aa00);border:1px solid #88ff00;color:#fff;margin-top:8px;text-shadow:0 0 8px #88ff00;">${t('watchAdRevive')}</button>`
    : '';

  if(phase===1){
    showOverlay(`<h2 style="color:#f44">${t('gameOver')}</h2><p>${t('scoreLabel')}: ${score} &nbsp;|&nbsp; <span style="color:#ffd700">${coins} FX</span></p><p style="margin-top:4px;">${t('aliensWon')}</p>${rewardBtn}<button onclick="goLobby()">${t('toLobby')}</button>`);
  } else {
    phaseTries--;
    if(phaseTries<=0){
      showOverlay(`<h2 style="color:#f44">${t('gameOver')}</h2><p>${t('noTries')}</p><p>${t('scoreLabel')}: ${score} &nbsp;|&nbsp; <span style="color:#ffd700">${coins} FX</span></p>${rewardBtn}<button onclick="goLobby()">${t('toLobby')}</button>`);
    } else {
      showOverlay(`<h2 style="color:#f44">${t('youDied')}</h2><p style="color:#ff0">${t('triesLeft')}: ${'❤'.repeat(phaseTries)}</p><p>${t('backToPhase')} ${phase}...</p>${rewardBtn}<button onclick="retryPhase()">${t('tryAgain')}</button><button onclick="goLobby()" style="background:none;border:1px solid #444;color:#666;margin-left:8px;">LOBBY</button>`);
    }
  }
}

function showClear(bonus){
  running=false;
  pauseMusic();
  clearTempWeapon();
  saveGame();
  // Interstitial sempre ao completar fase
  admobShowInterstitial();
  lastClearBonus=bonus;
  const doubleBtn = true
    ? `<button onclick="watchAdDoubleCoins()" style="background:linear-gradient(90deg,#6a5500,#aa8800);border:1px solid #ffd700;color:#fff;margin-top:8px;text-shadow:0 0 8px #ffd700;">🎬 ${t('adDoubleCoins')} (+${bonus} FX)</button>`
    : '';
  showOverlay(`<h2 style="color:#ff0">${t('phaseComplete',phase)}</h2>
    <p style="color:#0f0;font-size:14px;">${t('aliensKilled')}: ${killed}/${killGoal}</p>
    <p style="color:#ffd700;">+${bonus} ${t('bonusCoins')}</p>
    <p style="color:#ffd700;font-size:14px;">Total: ${coins} FX 🪙</p>
    ${doubleBtn}
    <button onclick="nextPhase()">${t('nextPhase',phase+1)}</button>
    <button onclick="goLobby()" style="background:linear-gradient(90deg,#0a0a0a,#111);border:1px solid #333;color:#888;margin-left:8px;font-size:11px;">LOBBY</button>`);
}

// ─── REWARDED AD ACTIONS ────────────────────────────────────────────
function watchAdRevive(){
  const ok = admobShowRewarded(()=>{
    // Revive: restaura HP e retoma a fase
    hp=3;
    if(phaseTries<=0) phaseTries=1;
    inv=true; invT=120;
    hideOverlay();
    document.getElementById('btnPause').classList.add('show');
    running=true;
    resumeMusic();
    if(!loopRunning) requestAnimationFrame(loop);
  });
  if(!ok){
    // Fallback se o anúncio não carregou
    alert(t('adUnavailable'));
  }
}

function spawnFirework(){
  const colors=['#ff4444','#ffaa00','#ffff00','#00ff88','#00ffff','#ff44ff','#ffffff','#ff8800'];
  const fx={
    x:80+Math.random()*(W-160), y:40+Math.random()*160,
    particles:[], color:colors[Math.floor(Math.random()*colors.length)]
  };
  for(let i=0;i<36;i++){
    const ang=i*(Math.PI*2/36);
    const spd=3+Math.random()*4;
    fx.particles.push({x:fx.x,y:fx.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:60+Math.random()*30,maxLife:90});
  }
  fireworks.push(fx);
}

function victoryLoop(){
  victoryT++;
  if(victoryScene===0) return;
  const c2=cx;
  const W2=W,H2=H;

  if(victoryScene===1){
    // PHASE 1: black screen 0.8s
    c2.fillStyle='#000'; c2.fillRect(0,0,W2,H2);
    if(victoryT>48) { victoryScene=2; victoryT=0; spawnFirework(); spawnFirework(); }

  } else if(victoryScene===2){
    // PHASE 2: celebration — dark sky, fireworks, audience, crown ceremony
    // BG gradient
    const g=c2.createLinearGradient(0,0,0,H2);
    g.addColorStop(0,'#000510'); g.addColorStop(1,'#0a0520');
    c2.fillStyle=g; c2.fillRect(0,0,W2,H2);

    // Spawn fireworks periodically
    if(victoryT%18===0&&fireworks.length<12) spawnFirework();

    // Draw + update fireworks
    for(let fi=fireworks.length-1;fi>=0;fi--){
      const fw=fireworks[fi];
      let alive=false;
      for(const p of fw.particles){
        p.x+=p.vx; p.y+=p.vy; p.vx*=0.97; p.vy+=0.06; p.life--;
        if(p.life>0){
          alive=true;
          const a=p.life/p.maxLife;
          c2.globalAlpha=a;
          c2.fillStyle=fw.color;
          c2.fillRect(p.x-1.5,p.y-1.5,3,3);
        }
      }
      c2.globalAlpha=1;
      if(!alive) fireworks.splice(fi,1);
    }

    // AUDIENCE — rows of cheering people
    const audBase=H2-30;
    // back rows darker
    for(let row=0;row<3;row++){
      const rowY=audBase-row*18;
      const rowScale=0.7+row*0.1;
      for(let i=0;i<32;i++){
        const px=i*21-4;
        const bob=Math.sin(victoryT*0.15+i*0.8+row)*5*rowScale;
        // body
        c2.fillStyle=`hsl(${(i*47)%360},60%,${20+row*5}%)`;
        c2.fillRect(px+2,rowY-22*rowScale+bob,14*rowScale,22*rowScale);
        // head
        c2.fillStyle=`hsl(${30+i*3},50%,55%)`;
        c2.beginPath();
        c2.arc(px+9*rowScale,rowY-26*rowScale+bob,7*rowScale,0,Math.PI*2);

        c2.strokeStyle=`hsl(${(i*47)%360},60%,${25+row*5}%)`;
        c2.lineWidth=2*rowScale;
        c2.beginPath();
        c2.moveTo(px+2,rowY-15*rowScale+bob);
        c2.lineTo(px-5*rowScale,rowY-28*rowScale+bob-Math.abs(Math.sin(victoryT*0.15+i))*8);
        c2.moveTo(px+14*rowScale,rowY-15*rowScale+bob);

  document.getElementById('controls').classList.remove('playing');SFX.button();

  paused=false;
  document.getElementById('pauseMenu').classList.remove('show');

  init(phase,false);

  if(prePhaseBonus==='shield'){
    inv=true; invT=300; // 5 seconds of invincibility
    activePowerup={type:'shield',time:300,label:'🛡 ESCUDO'};

      cx.fillStyle=['#ff2244','#ffaa00','#22ccff','#ff44cc','#44ff44','#aa44ff'][i];
      cx.beginPath();cx.ellipse(bx,by,6,8,0,0,Math.PI*2);cx.fill();
      cx.strokeStyle='#666';cx.lineWidth=0.5;cx.beginPath();cx.moveTo(bx,by+8);cx.lineTo(bx+2,by+22);cx.stroke();
    }
    cx.fillStyle='#8a6a40';cx.fillRect(0,GND,W,H-GND);
    cx.strokeStyle='rgba(200,150,80,0.7)';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,GND);cx.lineTo(W,GND);cx.stroke();

  } else if(bg==='beach'){
    // Tropical Beach — bright blue sky, ocean, palm trees, waves
    const g=cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#2299ee');g.addColorStop(.35,'#55bbff');g.addColorStop(.6,'#88ddff');g.addColorStop(1,'#55aacc');
    cx.fillStyle=g;cx.fillRect(0,0,W,H);
    // Sun top-right
    const sunG2=cx.createRadialGradient(550,30,5,550,30,50);
    sunG2.addColorStop(0,'rgba(255,255,220,0.95)');sunG2.addColorStop(.4,'rgba(255,240,150,0.3)');sunG2.addColorStop(1,'transparent');
    cx.fillStyle=sunG2;cx.fillRect(495,0,110,80);
    cx.fillStyle='#fffde0';cx.beginPath();cx.arc(550,30,14,0,Math.PI*2);cx.fill();
    // Clouds
    for(let i=0;i<4;i++){
      cx.fillStyle='rgba(255,255,255,0.7)';
      cx.beginPath();cx.ellipse(80+i*160,25+i%2*15,40,10,0,0,Math.PI*2);cx.fill();
    }
    // Ocean in far background
    cx.fillStyle='rgba(20,100,180,0.4)';cx.fillRect(0,GND-40,W,40);
    // Waves
    cx.strokeStyle='rgba(255,255,255,0.3)';cx.lineWidth=1;
    for(let w2=0;w2<3;w2++){
      cx.beginPath();
      for(let x2=0;x2<W;x2+=5){cx.lineTo(x2,GND-10-w2*12+Math.sin(t*0.06+x2*0.04+w2)*4);}
      cx.stroke();
    }
    // Palm trees
    const palms=[[80,GND],[250,GND],[450,GND],[600,GND]];
    for(const[px2,py2]of palms){
      cx.fillStyle='#6a4420';cx.fillRect(px2-3,py2-80,6,80);
      // fronds
      for(let f=0;f<5;f++){
        const fa=-0.8+f*0.4+Math.sin(t*0.03+px2)*0.05;
        cx.strokeStyle='#228822';cx.lineWidth=2;
        cx.beginPath();cx.moveTo(px2,py2-78);
        cx.quadraticCurveTo(px2+Math.cos(fa)*35,py2-78+Math.sin(fa)*15-15,px2+Math.cos(fa)*50,py2-60+Math.sin(fa)*20);
        cx.stroke();
      }
    }
    // Sand ground
    cx.fillStyle='#e8cc80';cx.fillRect(0,GND,W,H-GND);
    cx.strokeStyle='rgba(180,150,80,0.6)';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,GND);cx.lineTo(W,GND);cx.stroke();

  } else if(bg==='daycity'){
    // Solar City — bright futuristic city, blue sky, flying vehicles
    const g=cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#3388dd');g.addColorStop(.5,'#66aaee');g.addColorStop(1,'#4488bb');
    cx.fillStyle=g;cx.fillRect(0,0,W,H);
    // Sun with halo
    cx.fillStyle='rgba(255,255,200,0.3)';cx.beginPath();cx.arc(320,35,45,0,Math.PI*2);cx.fill();
    cx.fillStyle='#fffde0';cx.beginPath();cx.arc(320,35,16,0,Math.PI*2);cx.fill();
    // Clouds
    for(let i=0;i<6;i++){
      cx.fillStyle=`rgba(255,255,255,${0.5+i%2*0.2})`;
      cx.beginPath();cx.ellipse(50+i*115,15+i%3*12,30+i%2*15,8,0,0,Math.PI*2);cx.fill();
    }
    // Far buildings (light)
    const farB2=[[0,150,50],[55,130,40],[100,160,45],[150,140,38],[200,155,50],[260,135,42],[320,165,55],[380,145,40],[440,160,48],[500,138,42],[560,158,50],[610,142,38]];
    for(const[bx,bh,bw]of farB2){
      cx.fillStyle='#446688';cx.fillRect(bx,GND-bh,bw,bh);
      cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(bx,GND-bh,bw,3);
      // windows reflecting sun
      for(let wy=GND-bh+8;wy<GND-5;wy+=12){
        for(let wx=bx+4;wx<bx+bw-4;wx+=8){
          cx.fillStyle=Math.random()<0.7?'rgba(255,255,220,0.6)':'rgba(150,220,255,0.5)';
          cx.fillRect(wx,wy,4,6);
        }
      }
    }
    // Flying vehicles
    for(let i=0;i<3;i++){
      const vx=(i*200+t*1.5)%W, vy=50+i*30;
      cx.fillStyle='#aabbcc';cx.fillRect(vx,vy,16,5);
      cx.fillStyle='rgba(0,200,255,0.6)';cx.fillRect(vx-2,vy+4,4,2);cx.fillRect(vx+14,vy+4,4,2);
    }
    cx.fillStyle='#557799';cx.fillRect(0,GND,W,H-GND);
    cx.strokeStyle='rgba(100,200,255,0.5)';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,GND);cx.lineTo(W,GND);cx.stroke();

  } else if(bg==='jungle'){
    // Tropical Jungle — dense green canopy, vines, waterfalls, bright
    const g=cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#115522');g.addColorStop(.3,'#0d4418');g.addColorStop(.7,'#0a3310');g.addColorStop(1,'#082a0c');
    cx.fillStyle=g;cx.fillRect(0,0,W,H);
    // Canopy light rays
    for(let i=0;i<5;i++){
      const rx=60+i*130;
      cx.fillStyle=`rgba(180,255,100,${0.04+Math.sin(t*0.03+i)*0.02})`;
      cx.beginPath();cx.moveTo(rx,0);cx.lineTo(rx-20,GND);cx.lineTo(rx+30,GND);cx.lineTo(rx+10,0);cx.fill();
    }
    // Dense tree trunks
    for(let i=0;i<8;i++){
      const tx=i*80+10;
      cx.fillStyle='#3a2210';cx.fillRect(tx,GND-120-i%3*20,8,120+i%3*20);
      // branches
      cx.strokeStyle='#3a2210';cx.lineWidth=3;
      cx.beginPath();cx.moveTo(tx+4,GND-100);cx.quadraticCurveTo(tx+30,GND-115,tx+40,GND-105);cx.stroke();
    }
    // Leaves canopy top
    for(let i=0;i<20;i++){
      const lx=i*35-10, ly=10+i%4*15;
      cx.fillStyle=`rgba(${20+i%3*10},${120+i%4*25},${30+i%2*15},0.85)`;
      cx.beginPath();cx.ellipse(lx,ly,25+i%3*8,15,0,0,Math.PI*2);cx.fill();
    }
    // Vines hanging
    for(let i=0;i<10;i++){
      const vx=30+i*65;
      cx.strokeStyle=`rgba(30,120,40,0.5)`;cx.lineWidth=1.5;cx.beginPath();cx.moveTo(vx,0);
      for(let vy=0;vy<GND-30;vy+=8){cx.lineTo(vx+Math.sin(t*0.03+vy*0.08+i)*6,vy);}
      cx.stroke();
    }
    // Waterfall
    const wfx=420;
    cx.fillStyle='rgba(100,200,255,0.4)';cx.fillRect(wfx,40,10,GND-40);
    cx.fillStyle='rgba(200,240,255,0.5)';cx.fillRect(wfx+2,40,4,GND-40);
    // Splash at bottom
    cx.fillStyle='rgba(200,240,255,0.3)';cx.beginPath();cx.ellipse(wfx+5,GND,20,6,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#0a2a08';cx.fillRect(0,GND,W,H-GND);
    cx.strokeStyle='rgba(50,180,50,0.5)';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,GND);cx.lineTo(W,GND);cx.stroke();

  } else if(bg==='arena'){
    // Via Láctea — deep night sky with Milky Way band
    const g=cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#000510');g.addColorStop(.4,'#020818');g.addColorStop(.8,'#040c20');g.addColorStop(1,'#020610');
    cx.fillStyle=g;cx.fillRect(0,0,W,H);
    // Milky Way band — diagonal luminous cloud across the sky
    cx.save();cx.translate(W/2,GND/2);cx.rotate(-0.4);
    for(let i=0;i<5;i++){
      const mwG=cx.createRadialGradient(i*80-160,0,10,i*80-160,0,60+i*10);
      mwG.addColorStop(0,`rgba(${180+i*15},${170+i*10},${220+i*8},${0.08+Math.sin(t*0.02+i)*0.02})`);
      mwG.addColorStop(.5,`rgba(${100+i*10},${80+i*10},${160+i*15},${0.04+Math.sin(t*0.03+i)*0.01})`);
      mwG.addColorStop(1,'transparent');
      cx.fillStyle=mwG;cx.fillRect(i*80-200,-80,160,160);
    }
    // Dense star dust in the band
    for(let i=0;i<120;i++){
      const sx3=i*6-360+Math.sin(i*0.3)*20, sy3=-30+Math.sin(i*0.7)*35;
      const br=0.15+Math.random()*0.4;
      cx.fillStyle=`rgba(${200+Math.random()*55|0},${190+Math.random()*55|0},${220+Math.random()*35|0},${br})`;
      cx.fillRect(sx3,sy3,Math.random()<0.1?1.5:0.8,Math.random()<0.1?1.5:0.8);
    }
    cx.restore();
    // Nebula tints within the band
    const neb1=cx.createRadialGradient(200,80,5,200,80,70);
    neb1.addColorStop(0,`rgba(120,60,180,${0.06+Math.sin(t*0.025)*0.02})`);neb1.addColorStop(1,'transparent');
    cx.fillStyle=neb1;cx.fillRect(125,10,150,140);
    const neb2=cx.createRadialGradient(420,60,5,420,60,55);
    neb2.addColorStop(0,`rgba(60,100,200,${0.05+Math.sin(t*0.03)*0.015})`);neb2.addColorStop(1,'transparent');
    cx.fillStyle=neb2;cx.fillRect(360,5,120,110);
    // Bright stars scattered everywhere
    for(const s of bgStars){
      cx.fillStyle=`rgba(${220+s.a*35|0},${220+s.a*30|0},255,${s.a*0.85})`;
      cx.fillRect(s.x,s.y,s.r+0.3,s.r+0.3);
    }
    // Extra bright stars with cross twinkle
    const brightStars=[[100,30],[250,70],[400,25],[520,90],[180,150],[550,50],[80,120],[350,140],[480,45]];
    for(const[bsx,bsy]of brightStars){
      const tw=Math.sin(t*0.08+bsx+bsy)*0.4+0.6;
      cx.fillStyle=`rgba(255,255,255,${tw*0.9})`;
      cx.fillRect(bsx-0.5,bsy-0.5,2,2);
      // cross arms
      cx.fillStyle=`rgba(200,220,255,${tw*0.3})`;
      cx.fillRect(bsx-3,bsy,7,0.5);
      cx.fillRect(bsx,bsy-3,0.5,7);
    }
    // Shooting star (occasional)
    if(t%180<8){
      const ss=t%180;
      const ssx=100+ss*30, ssy=20+ss*8;
      cx.strokeStyle=`rgba(255,255,255,${1-ss/8})`;cx.lineWidth=1;
      cx.beginPath();cx.moveTo(ssx,ssy);cx.lineTo(ssx-20,ssy-6);cx.stroke();
    }
    // Soft horizon glow
    const hG=cx.createLinearGradient(0,GND-30,0,GND);
    hG.addColorStop(0,'transparent');hG.addColorStop(1,'rgba(20,30,60,0.4)');
    cx.fillStyle=hG;cx.fillRect(0,GND-30,W,30);
    // Dark ground with subtle blue tint
    cx.fillStyle='#060a14';cx.fillRect(0,GND,W,H-GND);
    cx.strokeStyle='rgba(60,80,140,0.4)';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(0,GND);cx.lineTo(W,GND);cx.stroke();

  } else if(bg==='boss'){
    // Final boss arena — red storm with warning signals
    const g=cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#080000');g.addColorStop(.4,'#150000');g.addColorStop(1,'#100000');
    cx.fillStyle=g;cx.fillRect(0,0,W,H);
    // Pulsing red vortex
    const vPulse=Math.sin(t*0.06)*0.06+0.08;
    for(let r=120;r>10;r-=18){
      const rG=cx.createRadialGradient(320,130,Math.max(0,r-18),320,130,r);
      rG.addColorStop(0,'transparent');rG.addColorStop(1,`rgba(255,0,0,${vPulse*(1-r/120)})`);
      cx.fillStyle=rG;cx.beginPath();cx.arc(320,130,r,0,Math.PI*2);cx.fill();
    }
    for(const s of bgStars){cx.fillStyle=`rgba(255,${s.a*60|0},${s.a*40|0},${s.a*0.6})`;cx.fillRect(s.x,s.y,s.r,s.r);}
    // Danger stripes
    for(let i=0;i<W;i+=50){
      cx.fillStyle='rgba(255,0,0,0.06)';cx.fillRect(i,0,25,GND);
    }
    // Warning symbols
    cx.font='bold 10px monospace';cx.textAlign='center';
    const warnAlpha=Math.sin(t*0.08)*0.4+0.5;
    cx.fillStyle=`rgba(255,0,0,${warnAlpha})`;
    cx.shadowColor='#ff0000';cx.shadowBlur=8;
    cx.fillText('⚠ DANGER ⚠',320,20);cx.fillText('⚠',60,50);cx.fillText('⚠',580,50);
    cx.shadowBlur=0;
    // Lightning cracks
    if(t%60<5){
      cx.strokeStyle=`rgba(255,80,80,${1-(t%60)/5})`;cx.lineWidth=2;cx.shadowColor='#ff2200';cx.shadowBlur=8;
      cx.beginPath();cx.moveTo(Math.random()*W|0,0);
      for(let li=0;li<5;li++){cx.lineTo(Math.random()*W|0,li*GND/5);}
      cx.stroke();cx.shadowBlur=0;
    }
    cx.fillStyle='#080000';cx.fillRect(0,GND,W,H-GND);
    cx.strokeStyle='rgba(255,0,0,0.7)';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,GND);cx.lineTo(W,GND);cx.stroke();
  }
}


// ─── DRAW PLATFORMS ───────────────────────────────────────────────────────────
function drawPlatforms(){
  const bg=PHASE_CFG[Math.min(phase-1,14)].bg;
  const cols={
    city:['#1a2d44','rgba(0,200,255,0.6)'],
    forest:['#0a2010','rgba(0,255,80,0.5)'],
    desert:['#2a1000','rgba(255,120,0,0.5)'],
    ocean:['#00182e','rgba(0,150,255,0.5)'],
    space:['#101030','rgba(100,150,255,0.5)'],
    nebula:['#1a0035','rgba(180,0,255,0.5)'],
    ice:['#102030','rgba(150,220,255,0.6)'],
    lava:['#2a0800','rgba(255,80,0,0.6)'],
    void:['#0a0015','rgba(120,0,200,0.5)'],
    park:['#6a4420','rgba(255,200,80,0.6)'],
    beach:['#8a7040','rgba(255,220,120,0.5)'],
    daycity:['#336688','rgba(100,200,255,0.5)'],
    jungle:['#2a4a18','rgba(80,200,80,0.5)'],
    arena:['#0a1020','rgba(80,100,200,0.4)'],
    boss:['#200005','rgba(255,0,80,0.6)'],
  };
  const[fill,glow]=cols[bg]||cols.city;
  for(const pl of platforms){
    cx.fillStyle=fill;cx.fillRect(pl.x,pl.y,pl.w,pl.h);
    cx.fillStyle=glow;cx.fillRect(pl.x,pl.y,pl.w,2);
    cx.fillStyle=fill;cx.globalAlpha=.5;cx.fillRect(pl.x+4,pl.y+3,pl.w-8,pl.h-4);cx.globalAlpha=1;
  }
}

// ─── DRAW ROBOT (PLAYER) ─────────────────────────────────────────────────────
function drawPlayer(){
  const p=player;
  if(inv&&Math.floor(invT/5)%2===0) return;
  const col=COLORS[selectedColor];
  const crouching=p.crouching;
  const sy=crouching?0.65:1.0;
  const offsetY=crouching?6:0;
  const pulse=Math.sin(frameT*0.08)*0.4+0.6;
  cx.save();cx.translate(p.x+p.w/2,p.y+p.h/2+offsetY);cx.scale(p.dir,sy);

  // ─── LEGS (articulated with joints) ───
  const lo=p.gr&&!crouching?Math.sin(p.fr*Math.PI/2)*3:0;
  // back leg (left)
  cx.fillStyle=col.c2;cx.fillRect(-10,11+lo,9,11);
  cx.fillStyle=col.c;cx.fillRect(-9,11+lo,7,4); // upper highlight
  cx.fillStyle=col.c3;cx.fillRect(-9,11+lo,7,1); // top shine
  cx.fillStyle='rgba(0,0,0,0.35)';cx.fillRect(-10,18+lo,9,2); // lower shadow
  // right leg
  cx.fillStyle=col.c2;cx.fillRect(1,11-lo,9,11);
  cx.fillStyle=col.c;cx.fillRect(2,11-lo,7,4);
  cx.fillStyle=col.c3;cx.fillRect(2,11-lo,7,1);
  cx.fillStyle='rgba(0,0,0,0.35)';cx.fillRect(1,18-lo,9,2);
  // knee joints — small circles
  cx.fillStyle='#1a1a22';cx.fillRect(-8,15+lo,5,2);
  cx.fillRect(3,15-lo,5,2);
  // boots — armored
  cx.fillStyle='#0a0a12';cx.fillRect(-11,21+lo,11,5);
  cx.fillRect(0,21-lo,11,5);
  // boot highlight
  cx.fillStyle='#2a2a35';cx.fillRect(-11,21+lo,11,1);
  cx.fillRect(0,21-lo,11,1);

  // ─── THRUSTER GLOW (jumping) ───
  if(!p.gr){
    const tg=Math.sin(frameT*0.4)*0.3+0.7;
    cx.fillStyle='rgba(255,200,0,'+tg*0.9+')';
    cx.fillRect(-9,23,7,5);cx.fillRect(2,23,7,5);
    cx.fillStyle='rgba(0,220,255,'+tg+')';
    cx.fillRect(-8,24,5,3);cx.fillRect(3,24,5,3);
    cx.fillStyle='rgba(255,255,255,0.9)';
    cx.fillRect(-7,25,3,1);cx.fillRect(4,25,3,1);
  }

  // ─── TORSO — layered armored chassis ───
  // main body
  cx.fillStyle=col.c;cx.fillRect(-12,-8,24,22);
  // top highlight strip
  cx.fillStyle=col.c3;cx.fillRect(-12,-8,24,3);
  cx.fillStyle='rgba(255,255,255,0.3)';cx.fillRect(-12,-8,24,1);
  // side shading
  cx.fillStyle='rgba(0,0,0,0.3)';cx.fillRect(10,-5,2,17);
  cx.fillStyle='rgba(0,0,0,0.2)';cx.fillRect(-12,-5,2,17);
  // chest armor inset plates
  cx.fillStyle=col.c2;cx.fillRect(-9,-3,7,12);cx.fillRect(2,-3,7,12);
  // panel seams
  cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(-9,-3,7,1);cx.fillRect(2,-3,7,1);
  cx.fillRect(-9,7,7,1);cx.fillRect(2,7,7,1);
  // plate highlights
  cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(-9,-2,7,1);cx.fillRect(2,-2,7,1);

  // ─── CHEST REACTOR CORE (animated) ───
  // outer ring
  cx.fillStyle='#0a0a0a';cx.beginPath();cx.arc(0,4,7,0,Math.PI*2);cx.fill();
  cx.fillStyle=col.c2;cx.beginPath();cx.arc(0,4,6,0,Math.PI*2);cx.fill();
  // energy core
  cx.fillStyle='rgba(0,100,200,'+pulse*0.9+')';cx.beginPath();cx.arc(0,4,5,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(0,220,255,'+pulse+')';cx.beginPath();cx.arc(0,4,3.5,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.95)';cx.beginPath();cx.arc(0,4,1.5,0,Math.PI*2);cx.fill();
  // reactor bolts
  cx.fillStyle='#333';
  cx.fillRect(-6,3,1,2);cx.fillRect(5,3,1,2);
  cx.fillRect(-1,-3,2,1);cx.fillRect(-1,10,2,1);

  // ─── WAIST BELT ───
  cx.fillStyle='#1a1a22';cx.fillRect(-12,12,24,3);
  cx.fillStyle=col.c3;cx.fillRect(-12,12,24,1);
  // belt buckle
  cx.fillStyle=col.c3;cx.fillRect(-3,12,6,3);
  cx.fillStyle='rgba(255,255,255,0.6)';cx.fillRect(-2,12,4,1);

  // ─── SHOULDERS — angular armor pauldrons ───
  // left (back) shoulder
  cx.fillStyle=col.c2;
  cx.beginPath();cx.moveTo(-12,-9);cx.lineTo(-17,-5);cx.lineTo(-17,4);cx.lineTo(-12,8);cx.closePath();cx.fill();
  cx.fillStyle=col.c;
  cx.beginPath();cx.moveTo(-12,-9);cx.lineTo(-17,-5);cx.lineTo(-17,0);cx.lineTo(-12,-2);cx.closePath();cx.fill();
  cx.fillStyle=col.c3;cx.fillRect(-16,-5,4,1);
  // right shoulder
  cx.fillStyle=col.c;
  cx.beginPath();cx.moveTo(12,-9);cx.lineTo(17,-5);cx.lineTo(17,4);cx.lineTo(12,8);cx.closePath();cx.fill();
  cx.fillStyle=col.c3;
  cx.beginPath();cx.moveTo(12,-9);cx.lineTo(17,-5);cx.lineTo(17,0);cx.lineTo(12,-2);cx.closePath();cx.fill();
  // shoulder edge highlight
  cx.fillStyle='rgba(255,255,255,0.25)';cx.fillRect(12,-9,5,1);

  // ─── ARM + GUN (right side) ───
  // upper arm
  cx.fillStyle=col.c2;cx.fillRect(12,-2,5,10);
  cx.fillStyle=col.c;cx.fillRect(12,-2,5,3);
  // forearm
  cx.fillStyle=col.c;cx.fillRect(13,7,4,4);
  // elbow joint

      cx.beginPath();cx.arc(a.vx>0?-18:14,bob,2+Math.random()*2,0,Math.PI*2);cx.fill();
    }
    cx.restore();
    // label
    cx.font='bold 7px monospace';cx.fillStyle=charging?'#ff4400':'#44cc00';cx.textAlign='center';
    cx.fillText(charging?'CHARGE!':'CHARGER',0,bob-26);
  }

  // Gold crown star
  if(a.isGold){
    cx.font='bold 14px monospace';cx.textAlign='center';
    cx.fillStyle='#ffd700';
    cx.fillText('★',0,-30);
  }
  cx.restore();
}
// ─── DRAW BULLETS ─────────────────────────────────────────────────────────────
function drawBullets(){
  for(const b of bullets){
    cx.save();
    if(b.weapon===1){
      // METRALHADORA — bala amarela compacta com trail
      cx.fillStyle='rgba(140,255,0,0.4)';
      cx.fillRect(b.x-10,b.y-1.5,18,3);
      cx.fillStyle=b.col;
      cx.fillRect(b.x-6,b.y-b.size/2,10,b.size);
      cx.fillStyle='#fff';
      cx.fillRect(b.x-3,b.y-b.size/4,6,b.size/2);
      // spark at tip
      cx.fillStyle='#ffff88';
      cx.beginPath();cx.arc(b.x+4,b.y,1.5,0,Math.PI*2);cx.fill();
    } else if(b.weapon===2){
      // FOGO — chama com núcleo
      const flick=Math.sin(frameT*0.5+b.x*0.1)*0.3+1;
      // outer flame
      cx.fillStyle='rgba(255,60,0,0.6)';
      cx.beginPath();cx.ellipse(b.x,b.y,b.size*4*flick,b.size*1.4,0,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ff6600';
      cx.beginPath();cx.ellipse(b.x,b.y,b.size*3*flick,b.size*1.2,0,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ffaa00';
      cx.beginPath();cx.ellipse(b.x,b.y,b.size*2*flick,b.size*0.9,0,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ffff00';
      cx.beginPath();cx.ellipse(b.x,b.y,b.size*1.2,b.size*0.6,0,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';
      cx.beginPath();cx.arc(b.x,b.y,b.size*0.4,0,Math.PI*2);cx.fill();
      // spark particles
      if(Math.random()<0.35) particles.push({x:b.x-b.vx*0.2,y:b.y+(Math.random()-0.5)*4,vx:-b.vx*0.15+(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:10,col:'#ffaa00',size:2});
    } else if(b.weapon===3){
      // RAIO — bolt elétrico com núcleo branco
      const zig=Math.sin(frameT*0.6+b.x*0.2)*4;
      // outer glow
      cx.fillStyle='rgba(255,255,0,0.3)';
      cx.beginPath();cx.ellipse(b.x,b.y,16,6,0,0,Math.PI*2);cx.fill();
      // lightning zigzag
      cx.strokeStyle=b.col;cx.lineWidth=3;cx.lineCap='round';
      cx.beginPath();
      cx.moveTo(b.x-14,b.y-2+zig*0.5);
      cx.lineTo(b.x-6,b.y+3-zig);
      cx.lineTo(b.x+2,b.y-3+zig);
      cx.lineTo(b.x+10,b.y+2-zig*0.7);
      cx.lineTo(b.x+16,b.y-zig*0.3);
      cx.stroke();
      // white core
      cx.strokeStyle='#fff';cx.lineWidth=1.5;
      cx.beginPath();
      cx.moveTo(b.x-14,b.y-2+zig*0.5);
      cx.lineTo(b.x-6,b.y+3-zig);
      cx.lineTo(b.x+2,b.y-3+zig);
      cx.lineTo(b.x+10,b.y+2-zig*0.7);
      cx.lineTo(b.x+16,b.y-zig*0.3);
      cx.stroke();
      // bright spark at tip
      cx.fillStyle='#fff';
      cx.beginPath();cx.arc(b.x+16,b.y-zig*0.3,2.5,0,Math.PI*2);cx.fill();
    } else if(b.weapon===4){
      // LAVA — bola com núcleo de fogo e trail
      const r2=b.size*2.5+Math.sin(frameT*0.3)*1.5;
      // outer ember glow
      cx.fillStyle='rgba(255,100,0,0.3)';
      cx.beginPath();cx.arc(b.x,b.y,r2*1.5,0,Math.PI*2);cx.fill();
      // main molten body
      cx.fillStyle='#ff3300';
      cx.beginPath();cx.arc(b.x,b.y,r2,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ff6600';
      cx.beginPath();cx.arc(b.x,b.y,r2*0.8,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ffaa00';
      cx.beginPath();cx.arc(b.x,b.y,r2*0.55,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ffee00';
      cx.beginPath();cx.arc(b.x,b.y,r2*0.35,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';
      cx.beginPath();cx.arc(b.x-r2*0.2,b.y-r2*0.2,r2*0.2,0,Math.PI*2);cx.fill();
      // molten drip particles
      if(Math.random()<0.5) particles.push({x:b.x-b.vx*0.3,y:b.y,vx:(Math.random()-0.5)*1,vy:(Math.random()-0.3)*2,life:20,col:'#ff4400',size:3});
    } else if(b.weapon===5){
      // PLASMA — esfera roxa com aura e trail
      const r3=b.size+1.5;
      // outer soft glow
      cx.fillStyle='rgba(200,70,255,0.25)';
      cx.beginPath();cx.arc(b.x,b.y,r3+6,0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(200,70,255,0.5)';
      cx.beginPath();cx.arc(b.x,b.y,r3+3,0,Math.PI*2);cx.fill();
      // main orb
      cx.fillStyle=b.col;
      cx.beginPath();cx.arc(b.x,b.y,r3,0,Math.PI*2);cx.fill();
      // inner shine
      cx.fillStyle='rgba(255,200,255,0.8)';
      cx.beginPath();cx.arc(b.x-1,b.y-1,r3*0.55,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';
      cx.beginPath();cx.arc(b.x-r3*0.3,b.y-r3*0.3,r3*0.3,0,Math.PI*2);cx.fill();
      // trail sparkle
      if(Math.random()<0.3) particles.push({x:b.x-b.vx*0.2,y:b.y,vx:0,vy:0,life:14,col:'#cc44ff',size:2});
    } else {
      // PISTOLA — bala ciano elegante
      // soft trail
      cx.fillStyle='rgba(0,230,255,0.35)';
      cx.fillRect(b.x-12,b.y-1.5,20,3);
      // main bullet
      cx.fillStyle=b.col;
      cx.fillRect(b.x-8,b.y-b.size/2,16,b.size);
      // white core
      cx.fillStyle='#fff';
      cx.fillRect(b.x-4,b.y-b.size/4,7,b.size/2);
      // tip glow
      cx.fillStyle='rgba(255,255,255,0.9)';
      cx.beginPath();cx.arc(b.x+7,b.y,1.5,0,Math.PI*2);cx.fill();
    }
    cx.restore();
  }
}

// ─── DRAW PARTICLES ───────────────────────────────────────────────────────────
function drawParticles(){
  // Faster: group by color using simple fillRect without per-particle state changes
  // globalAlpha set once at low opacity is fine since particles blend naturally
  const n=particles.length;
  for(let i=0;i<n;i++){
    const p=particles[i];
    if(p.life<=0) continue;
    // skip near-invisible
    if(p.life<3) continue;
    cx.fillStyle=p.col;
    const s=p.size|0;
    cx.fillRect((p.x-s/2)|0,(p.y-s/2)|0,s,s);
  }
}

// ─── DRAW HUD ─────────────────────────────────────────────────────────────────
function drawHUD(){
  // top bar bg
  cx.fillStyle='rgba(0,0,0,0.75)';cx.fillRect(0,0,W,26);
  cx.font='13px "Share Tech Mono",monospace';
  // HP
  cx.fillStyle='#f44';cx.textAlign='left';cx.fillText('❤'.repeat(Math.max(0,hp))||'💀',6,17);
  // Score
  cx.fillStyle='#0cf';cx.fillText('PTS '+score,90,17);
  // Tries (phase 2+)
  if(phase>1){cx.fillStyle='#f88';cx.fillText('+❤'.repeat(Math.max(0,phaseTries)),175,17);}
  // Weapon
  cx.fillStyle=WEAPONS[selectedWeapon].color;cx.textAlign='center';cx.fillText(WEAPONS[selectedWeapon].icon+' '+WEAPONS[selectedWeapon].name,W/2,17);
  // Phase
  cx.fillStyle='#ff0';cx.textAlign='right';cx.font='bold 13px "Orbitron",monospace';cx.fillText('F'+phase,W-6,17);
  // Kill progress bar
  const pct=Math.min(killed/killGoal,1);
  cx.fillStyle='#0a0a0a';cx.fillRect(0,26,W,6);
  const bg=PHASE_CFG[Math.min(phase-1,14)].bg;
  const barCols={city:'#0cf',forest:'#0f5',desert:'#f80',ocean:'#08f',space:'#88f',nebula:'#c0f',ice:'#aef',lava:'#f40',void:'#80f',boss:'#f00'};
  cx.fillStyle=barCols[bg]||'#0cf';cx.fillRect(0,26,W*pct,6);
  // kills text
  cx.font='8px "Share Tech Mono",monospace';cx.fillStyle='rgba(255,255,255,0.7)';cx.textAlign='left';
  if(phase===15){
    if(bossPhase10===1) cx.fillText(`ALIENS: ${bossKillCount}/30 — ${t('killAliens',30)}`,4,30);
    else if(bossPhase10===2) cx.fillText(`DRONES: ${bossKillCount-30<0?0:bossKillCount-30}/20 — ${t('killDrones')}`,4,30);
    else if(bossPhase10===3) cx.fillText(`BOSS HP: ${boss?boss.hp:0}/10 — ${t('useAllWeapons')}`,4,30);
    else cx.fillText(t('bossDefeated'),4,30);
  } else {
    cx.fillText(`KILLS: ${killed}/${killGoal}`,4,30);
  }
  // coins
  cx.fillStyle='#ffd700';cx.textAlign='right';cx.fillText(`🪙 ${coins}`,W-4,30);
}





// ─── DRAW GRENADES ───
function drawGrenades(){
  for(const g of grenades){
    cx.save();
    cx.translate(g.x,g.y);
    cx.rotate(g.rot);
    // body
    cx.fillStyle='#2a3a1a';
    cx.fillRect(-7,-8,14,14);
    cx.fillStyle='#3f5a20';
    cx.fillRect(-6,-7,12,12);
    // metallic highlight
    cx.fillStyle='#6a8a40';
    cx.fillRect(-5,-6,4,3);
    // ring on top
    cx.fillStyle='#888';
    cx.fillRect(-3,-11,6,3);
    cx.strokeStyle='#888';cx.lineWidth=1.5;
    cx.beginPath();cx.arc(0,-12,2,0,Math.PI*2);cx.stroke();

    if(g.fuse<30&&Math.floor(g.fuse/3)%2===0){
      cx.shadowColor='#ff0000';cx.shadowBlur=10;

// ─── DRAW EXPLOSIONS ───
function drawExplosions(){
  for(const ex of explosions){
    const a=ex.life/ex.maxLife;
    const r=ex.r;
    cx.save();
    // outer shockwave ring
    cx.strokeStyle=`rgba(255,200,0,${a*0.9})`;
    cx.lineWidth=4;
    cx.shadowColor='#ffaa00';cx.shadowBlur=20;
    cx.beginPath();cx.arc(ex.x,ex.y,r,0,Math.PI*2);cx.stroke();
    // inner fireball (only early in lifecycle)
    if(a>0.5){
      const innerR=r*0.65;
      const grd=cx.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,innerR);
      grd.addColorStop(0,`rgba(255,255,255,${a})`);
      grd.addColorStop(0.3,`rgba(255,220,0,${a*0.9})`);
      grd.addColorStop(0.7,`rgba(255,100,0,${a*0.6})`);
      grd.addColorStop(1,`rgba(255,50,0,0)`);
      cx.fillStyle=grd;
      cx.beginPath();cx.arc(ex.x,ex.y,innerR,0,Math.PI*2);cx.fill();
    }
    // secondary ring
    if(a>0.3){
      cx.strokeStyle=`rgba(255,100,0,${a*0.7})`;
      cx.lineWidth=2;
      cx.beginPath();cx.arc(ex.x,ex.y,r*0.85,0,Math.PI*2);cx.stroke();
    }
    cx.restore();
  }
}

// ─── DRAW SCREEN FLASH ───
function drawScreenFlash(){
  if(screenFlash>0){
    const a=screenFlash/25;
    cx.fillStyle=`rgba(255,255,255,${a*0.7})`;
    cx.fillRect(0,0,W,H);
  }
}

// ─── DRAW POWERUPS ───
function drawPowerups(){
  for(const pw of powerups){
    const glow=Math.sin(frameT*0.2)*0.3+0.7;
    const blink=pw.life<120&&Math.floor(pw.life/5)%2===0;
    if(blink) continue;
    cx.save();
    if(pw.type==='nuke'){
      // Special nuke visual — big pulsing glow
      const nPulse=Math.sin(frameT*0.15)*0.4+0.6;
      const nSize=12+Math.sin(frameT*0.1)*3;
      // outer ring
      cx.strokeStyle=`rgba(255,0,68,${nPulse})`;cx.lineWidth=2;
      cx.beginPath();cx.arc(pw.x,pw.y,nSize+6,0,Math.PI*2);cx.stroke();
      // glow
      cx.fillStyle=`rgba(255,0,68,${nPulse*0.3})`;
      cx.beginPath();cx.arc(pw.x,pw.y,nSize+8,0,Math.PI*2);cx.fill();
      // core
      cx.fillStyle=`rgba(255,0,68,${nPulse})`;
      cx.beginPath();cx.arc(pw.x,pw.y,nSize,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';
      cx.font='bold 16px monospace';
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('☢',pw.x,pw.y);
    } else {
      // Normal powerup
      cx.fillStyle=pw.color;
      cx.globalAlpha=0.3;
      cx.beginPath();cx.arc(pw.x,pw.y,14,0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;
      cx.fillStyle=pw.color;
      cx.beginPath();cx.arc(pw.x,pw.y,10,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';
      cx.font='bold 14px monospace';
      cx.textAlign='center';cx.textBaseline='middle';
      const icons={shield:'🛡',rapid:'⚡',damage:'💥',coins:'🪙',heal:'❤',grenade:'💣'};
      cx.fillText(icons[pw.type]||'?',pw.x,pw.y);
    }
    cx.restore();
  }
}

// ─── DRAW FLOAT TEXTS ───
function drawFloatTexts(){
  cx.font='bold 11px monospace';
  cx.textAlign='center';
  for(const ft of floatTexts){
    if(ft.life<5) continue;
    cx.globalAlpha=Math.min(1,ft.life/30);
    cx.fillStyle=ft.col;
    cx.fillText(ft.txt,ft.x,ft.y);
  }
  cx.globalAlpha=1;
}

// ─── DRAW COMBO METER ───
function drawCombo(){
  if(combo<2) return;
  const mult=comboMultiplier();
  const colors=['#fff','#fff','#ffff00','#ff8800','#ff0088','#ff00ff'];
  const col=colors[Math.min(mult,5)];
  cx.save();
  const pct=comboT/COMBO_TIME;
  const pulse=Math.sin(frameT*0.3)*0.1+1;
  cx.translate(W-12,60);
  // bg
  cx.fillStyle='rgba(0,0,0,0.6)';
  cx.fillRect(-90,0,90,36);
  // combo bar (countdown)
  cx.fillStyle=col;
  cx.fillRect(-90,0,90*pct,3);
  // text
  cx.font=`bold ${16*pulse}px "Orbitron",monospace`;
  cx.textAlign='right';
  cx.fillStyle=col;
  cx.fillText(combo+' COMBO',-6,18);
  if(mult>=2){
    cx.font='bold 12px "Orbitron",monospace';
    cx.fillText('x'+mult+' MULT',-6,32);
  }
  cx.restore();
}

// ─── DRAW POWERUP STATUS ───
function drawPowerupStatus(){
  if(!activePowerup) return;
  const a=activePowerup;
  const colors={shield:'#00aaff',rapid:'#ffff00',damage:'#ff4444'};

  cx.textAlign='left';

}

// ─── DRAW BOSS ───────────────────────────────────────────────────────────────
function drawBoss(){
  if(!boss) return;
  const b=boss;
  const flash=b.flash>0;
  const t=frameT;
  cx.save();
  cx.translate(b.x+b.w/2, b.y+b.h/2);

  const pulse=Math.sin(t*0.08)*0.3+0.5;

  // Ground shadow
  cx.fillStyle='rgba(0,0,0,0.4)';
  cx.beginPath();cx.ellipse(0,b.h/2+2,b.w/2*0.8,6,0,0,Math.PI*2);cx.fill();

  // Red aura (cheap — filled rects)
  const auraSize=20+Math.sin(t*0.1)*6;
  cx.fillStyle=`rgba(180,0,0,${0.15+pulse*0.1})`;
  cx.beginPath();cx.ellipse(0,0,b.w/2+auraSize,b.h/2+auraSize,0,0,Math.PI*2);cx.fill();
  cx.fillStyle=`rgba(255,0,40,${0.1+pulse*0.08})`;
  cx.beginPath();cx.ellipse(0,0,b.w/2+auraSize/2,b.h/2+auraSize/2,0,0,Math.PI*2);cx.fill();

  if(flash){cx.globalAlpha=0.5+Math.sin(b.flash*1.2)*0.4;}

  const hw=b.w/2, hh=b.h/2;
  const sx=hw/60, sy=hh/80;

  // ── BODY (layered armored plates) ──
  // darkest outer shell
  cx.fillStyle=flash?'#fff':'#0a0015';
  cx.fillRect(-hw,-hh+8*sy,hw*2,hh*2-8*sy);
  // mid shell
  cx.fillStyle=flash?'#fff':'#1f0035';
  cx.fillRect(-hw+4*sx,-hh+12*sy,hw*2-8*sx,hh*2-16*sy);
  // inner panel
  cx.fillStyle=flash?'#fff':'#2a0048';
  cx.fillRect(-hw+8*sx,-hh+16*sy,hw*2-16*sx,hh*2-24*sy);
  // top highlight strip
  cx.fillStyle=flash?'#fff':'#4a0080';
  cx.fillRect(-hw+8*sx,-hh+16*sy,hw*2-16*sx,3*sy);

  // ── CHEST ARMOR PLATE ──
  cx.fillStyle='#12001a';
  cx.fillRect(-26*sx,-22*sy,52*sx,40*sy);
  cx.fillStyle=flash?'#fff':'#3a0055';
  cx.fillRect(-24*sx,-20*sy,48*sx,36*sy);
  // panel seams
  cx.fillStyle='#1a0028';
  cx.fillRect(-24*sx,-2*sy,48*sx,1);
  cx.fillRect(-1*sx,-20*sy,2,36*sy);
  // rivets at corners
  cx.fillStyle='#aa00ff';
  cx.fillRect(-22*sx,-18*sy,2,2);
  cx.fillRect(20*sx,-18*sy,2,2);
  cx.fillRect(-22*sx,12*sy,2,2);
  cx.fillRect(20*sx,12*sy,2,2);

  // ── REACTOR CORE (animated) ──
  const rPulse=Math.sin(t*0.15)*0.25+0.75;
  // outer ring
  cx.fillStyle='#000';
  cx.beginPath();cx.arc(0,-2*sy,13*sx,0,Math.PI*2);cx.fill();
  cx.fillStyle=`rgba(${160+rPulse*60|0},0,${160+rPulse*80|0},${rPulse*0.9})`;
  cx.beginPath();cx.arc(0,-2*sy,11*sx,0,Math.PI*2);cx.fill();
  cx.fillStyle=`rgba(${200+rPulse*55|0},${60*rPulse|0},${200+rPulse*55|0},${rPulse})`;
  cx.beginPath();cx.arc(0,-2*sy,8*sx,0,Math.PI*2);cx.fill();
  cx.fillStyle=`rgba(255,${180*rPulse|0},255,${rPulse})`;
  cx.beginPath();cx.arc(0,-2*sy,5*sx,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.9)';
  cx.beginPath();cx.arc(-1*sx,-3*sy,2*sx,0,Math.PI*2);cx.fill();

  // ── SHOULDERS (layered armor) ──
  cx.fillStyle='#0a0010';
  cx.fillRect(-hw-2*sx,-32*sy,20*sx,40*sy);
  cx.fillRect(hw-18*sx,-32*sy,20*sx,40*sy);
  cx.fillStyle=flash?'#fff':'#2a0038';
  cx.fillRect(-hw,-30*sy,18*sx,36*sy);
  cx.fillRect(hw-18*sx,-30*sy,18*sx,36*sy);
  cx.fillStyle=flash?'#fff':'#440060';
  cx.fillRect(-hw+2*sx,-28*sy,14*sx,4*sy);
  cx.fillRect(hw-16*sx,-28*sy,14*sx,4*sy);

  // ── SHOULDER SPIKES (animated subtle) ──
  cx.fillStyle='#660080';
  for(let i=0;i<3;i++){
    // left
    cx.beginPath();
    cx.moveTo(-hw+i*6*sx,-32*sy);
    cx.lineTo(-hw+i*6*sx+3*sx,-45*sy);
    cx.lineTo(-hw+i*6*sx+6*sx,-32*sy);
    cx.fill();
    // right
    cx.beginPath();
    cx.moveTo(hw-18*sx+i*6*sx,-32*sy);
    cx.lineTo(hw-18*sx+i*6*sx+3*sx,-45*sy);
    cx.lineTo(hw-18*sx+i*6*sx+6*sx,-32*sy);
    cx.fill();
  }
  // spike glow tips
  cx.fillStyle=`rgba(255,0,180,${0.6+pulse*0.4})`;
  for(let i=0;i<3;i++){
    cx.beginPath();cx.arc(-hw+i*6*sx+3*sx,-45*sy,1.5,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(hw-18*sx+i*6*sx+3*sx,-45*sy,1.5,0,Math.PI*2);cx.fill();
  }

  // ── ARMS ──
  cx.fillStyle='#1a0028';
  cx.fillRect(-hw,-5*sy,14*sx,30*sy);
  cx.fillRect(hw-14*sx,-5*sy,14*sx,30*sy);
  cx.fillStyle=flash?'#fff':'#3a0048';
  cx.fillRect(-hw+2*sx,-3*sy,10*sx,26*sy);
  cx.fillRect(hw-12*sx,-3*sy,10*sx,26*sy);
  // arm highlight
  cx.fillStyle='#550070';
  cx.fillRect(-hw+2*sx,-3*sy,10*sx,2);
  cx.fillRect(hw-12*sx,-3*sy,10*sx,2);

  // ── CLAWS ──
  cx.fillStyle='#3a0050';
  cx.fillRect(-hw-6*sx,22*sy,8*sx,5*sy);
  cx.fillRect(-hw-4*sx,26*sy,6*sx,4*sy);
  cx.fillRect(hw-2*sx,22*sy,8*sx,5*sy);
  cx.fillRect(hw-2*sx,26*sy,6*sx,4*sy);
  // claw sharp tips
  cx.fillStyle='#aa00dd';
  cx.fillRect(-hw-8*sx,24*sy,3*sx,2);
  cx.fillRect(hw+5*sx,24*sy,3*sx,2);

  // ── LEGS ──
  cx.fillStyle='#0d001a';
  cx.fillRect(-26*sx,hh-20*sy,20*sx,20*sy);
  cx.fillRect(6*sx,hh-20*sy,20*sx,20*sy);
  cx.fillStyle=flash?'#fff':'#25003a';
  cx.fillRect(-24*sx,hh-18*sy,16*sx,16*sy);
  cx.fillRect(8*sx,hh-18*sy,16*sx,16*sy);

  // ── FEET ──
  cx.fillStyle='#050008';
  cx.fillRect(-28*sx,hh-3*sy,24*sx,4*sy);
  cx.fillRect(4*sx,hh-3*sy,24*sx,4*sy);
  cx.fillStyle='#1a0020';
  cx.fillRect(-28*sx,hh-3*sy,24*sx,1);
  cx.fillRect(4*sx,hh-3*sy,24*sx,1);

  // ── HEAD ──
  cx.fillStyle='#080012';
  cx.fillRect(-30*sx,-hh-2*sy,60*sx,38*sy);
  cx.fillStyle=flash?'#fff':'#1d0030';
  cx.fillRect(-28*sx,-hh,56*sx,34*sy);
  cx.fillStyle=flash?'#fff':'#2a0044';
  cx.fillRect(-26*sx,-hh+2*sy,52*sx,30*sy);
  // top highlight
  cx.fillStyle='#4a0068';
  cx.fillRect(-26*sx,-hh+2*sy,52*sx,2);

  // ── DEMON HORNS ──
  cx.fillStyle='#550070';
  cx.beginPath();
  cx.moveTo(-24*sx,-hh);
  cx.lineTo(-34*sx,-hh-22*sy);
  cx.lineTo(-28*sx,-hh-6*sy);
  cx.lineTo(-14*sx,-hh);
  cx.fill();
  cx.beginPath();
  cx.moveTo(14*sx,-hh);
  cx.lineTo(28*sx,-hh-6*sy);
  cx.lineTo(34*sx,-hh-22*sy);
  cx.lineTo(24*sx,-hh);
  cx.fill();
  // horn glow tips
  cx.fillStyle=`rgba(255,0,200,${0.7+pulse*0.3})`;
  cx.beginPath();cx.arc(-34*sx,-hh-22*sy,3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(34*sx,-hh-22*sy,3,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(-34*sx,-hh-22*sy,1.5,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(34*sx,-hh-22*sy,1.5,0,Math.PI*2);cx.fill();

  // ── EYES (glowing red) ──
  const ePulse=Math.sin(t*0.2)*0.2+0.8;
  // eye socket
  cx.fillStyle='#000';
  cx.fillRect(-24*sx,-hh+8*sy,20*sx,15*sy);
  cx.fillRect(4*sx,-hh+8*sy,20*sx,15*sy);
  // iris outer
  cx.fillStyle=`rgba(${180*ePulse},0,0,${ePulse})`;
  cx.fillRect(-22*sx,-hh+10*sy,16*sx,11*sy);
  cx.fillRect(6*sx,-hh+10*sy,16*sx,11*sy);
  // iris inner
  cx.fillStyle=`rgba(255,${60*ePulse},${60*ePulse},${ePulse})`;
  cx.fillRect(-20*sx,-hh+12*sy,12*sx,7*sy);
  cx.fillRect(8*sx,-hh+12*sy,12*sx,7*sy);
  // pupil (white)
  cx.fillStyle=`rgba(255,200,200,${ePulse})`;
  cx.fillRect(-16*sx,-hh+14*sy,4*sx,3*sy);
  cx.fillRect(12*sx,-hh+14*sy,4*sx,3*sy);

  // ── MOUTH (teeth) ──
  cx.fillStyle='#100';
  cx.fillRect(-14*sx,-hh+25*sy,28*sx,8*sy);
  cx.fillStyle='rgba(180,0,0,0.3)';
  cx.fillRect(-14*sx,-hh+25*sy,28*sx,8*sy);
  // jagged teeth
  cx.fillStyle='#eee';
  for(let i=0;i<6;i++){
    const tx=-12*sx+i*4*sx;
    cx.beginPath();
    cx.moveTo(tx,-hh+25*sy);
    cx.lineTo(tx+2*sx,-hh+30*sy);
    cx.lineTo(tx+4*sx,-hh+25*sy);
    cx.fill();
  }

  // ── ARMOR TRIM (glowing edges) ──
  cx.strokeStyle=`rgba(200,0,255,${0.5+pulse*0.3})`;
  cx.lineWidth=1.5;
  cx.strokeRect(-hw+4*sx,-hh+12*sy,hw*2-8*sx,hh*2-16*sy);

  cx.globalAlpha=1;
  cx.restore();

  // HP BAR above boss (floating)
  const barW=140, barX=b.x+b.w/2-barW/2, barY=b.y-28;
  cx.fillStyle='rgba(0,0,0,0.75)';
  cx.fillRect(barX-3,barY-3,barW+6,20);
  cx.fillStyle='#1a0008';
  cx.fillRect(barX,barY,barW,14);
  const hpPct=b.hp/b.maxHp;
  // hp color changes
  const hpCol=hpPct>0.5?'#ff2244':hpPct>0.25?'#ff6611':'#ff0000';
  cx.fillStyle=hpCol;
  cx.fillRect(barX,barY,barW*hpPct,14);
  // top shine
  cx.fillStyle='rgba(255,255,255,0.3)';
  cx.fillRect(barX,barY,barW*hpPct,3);
  // border
  cx.strokeStyle=`rgba(255,0,80,${0.7+pulse*0.3})`;
  cx.lineWidth=1.5;
  cx.strokeRect(barX,barY,barW,14);
  // label
  cx.font='bold 10px monospace';
  cx.fillStyle='#fff';cx.textAlign='center';
  cx.fillText(`BOSS  ${b.hp}/${b.maxHp} HP`,barX+barW/2,barY+11);

  // BOSS name plate
  cx.font='bold 12px "Orbitron",monospace';
  cx.fillStyle=`rgba(255,0,80,${0.85+pulse*0.15})`;
  cx.fillText('⚠ MEGA BOSS ⚠',b.x+b.w/2,b.y-38);
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function loop(){
  if(victoryScene>0){loopRunning=false;return;}
  loopRunning=true;
  // FPS auto-detect
  const now=performance.now();
  if(lastFrameT){
    const dt=now-lastFrameT;
    fpsAccum+=dt; fpsFrames++;
    if(fpsFrames>=30){
      const avgMs=fpsAccum/fpsFrames;
      if(avgMs>30&&perfMode<2) perfMode++;    // <33fps -> reduce
      else if(avgMs<18&&perfMode>0) perfMode--; // >55fps -> increase
      fpsAccum=0; fpsFrames=0;
    }
  }
  lastFrameT=now;
  pollGamepad();
  update();
  cx.clearRect(0,0,W,H);
  cx.save();
  cx.translate(shakeX,shakeY);
  drawBg();
  if(running||phaseOver){
    drawPlatforms();drawBullets();drawBossBullets();
    for(const a of aliens)drawAlien(a);
    if(boss)drawBoss();
    drawPlayer();
    drawGrenades();
    drawExplosions();
    drawParticles();
    drawPowerups();
    drawFloatTexts();
  }
  cx.restore();
  // Screen flash AFTER restore (overlays everything)
  if(running||phaseOver) drawScreenFlash();
  if(running||phaseOver){drawHUD();drawCombo();drawPowerupStatus();}
  // Nuke flash effect
  if(nukeFlash>0){
    cx.fillStyle=`rgba(255,255,255,${nukeFlash/20*0.7})`;
    cx.fillRect(0,0,W,H);
    nukeFlash--;
  }
  if(victoryScene===0) requestAnimationFrame(loop); else loopRunning=false;
}

// ─── START ────────────────────────────────────────────────────────────────────
function applyTranslations(){
  const s=(id,key)=>{ const el=document.getElementById(id); if(el) el.textContent=t(key); };
  s('lblColor','robotColor'); s('lblProgress','progress'); s('lblArsenal','arsenal');
  s('lblPlay','enterPhase'); s('lblPaused','paused');
  s('lblMusic','music'); s('lblSfx','sfx');
  s('lblContinue','continue_'); s('lblToLobby','toLobby');
  const adBtn=document.getElementById('btnAdCoins');
  if(adBtn) adBtn.textContent=t('watchAdCoins');
  s('lblAdShield','adShield'); s('lblAdGrenade','adGrenade');
}
loadGame();
loadVolumes();
applyTranslations();
buildLobby();
loop();
</script>
