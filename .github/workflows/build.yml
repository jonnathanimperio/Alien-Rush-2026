L
name: Build Alien Rush FX AAB
 
on:
  push:
    branches: [main]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
 
      - name: Install dependencies
        run: npm install
 
      - name: Add Android platform
        run: npx cap add android
 
      - name: Sync Capacitor
        run: npx cap sync android
 
      - name: Replace app icons
        run: |
          BASE="android/app/src/main/res"
          cp resources/icon-48.png $BASE/mipmap-mdpi/ic_launcher.png
          cp resources/icon-72.png $BASE/mipmap-hdpi/ic_launcher.png
          cp resources/icon-96.png $BASE/mipmap-xhdpi/ic_launcher.png
          cp resources/icon-144.png $BASE/mipmap-xxhdpi/ic_launcher.png
          cp resources/icon-192.png $BASE/mipmap-xxxhdpi/ic_launcher.png
          cp resources/icon-48.png $BASE/mipmap-mdpi/ic_launcher_round.png
          cp resources/icon-72.png $BASE/mipmap-hdpi/ic_launcher_round.png
          cp resources/icon-96.png $BASE/mipmap-xhdpi/ic_launcher_round.png
          cp resources/icon-144.png $BASE/mipmap-xxhdpi/ic_launcher_round.png
          cp resources/icon-192.png $BASE/mipmap-xxxhdpi/ic_launcher_round.png
 
      - name: Configure Android manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-6853379352980306~7008734812"/>\n</application>|' $MANIFEST
          sed -i 's|</manifest>|<uses-permission android:name="android.permission.INTERNET"/>\n<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n</manifest>|' $MANIFEST
          sed -i 's/android:screenOrientation="[^"]*"/android:screenOrientation="landscape"/' $MANIFEST
 
      - name: Configure fullscreen
        run: |
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="AppTheme" parent="Theme.AppCompat.NoActionBar"><item name="android:windowNoTitle">true</item><item name="android:windowFullscreen">true</item><item name="android:windowContentOverlay">@null</item><item name="android:statusBarColor">@android:color/black</item><item name="android:navigationBarColor">@android:color/black</item></style><style name="AppTheme.NoActionBar" parent="AppTheme"><item name="android:windowActionBar">false</item><item name="android:windowNoTitle">true</item></style></resources>' > android/app/src/main/res/values/styles.xml
 
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
 
      - name: Create keystore properties
        run: |
          echo "storeFile=keystore.jks" > android/app/keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/app/keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/app/keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/app/keystore.properties
 
      - name: Configure signing
        run: |
          cd android/app
          sed -i '/android {/a\    signingConfigs { release { def p=new Properties(); def f=rootProject.file("app/keystore.properties"); if(f.exists()){p.load(new FileInputStream(f)); storeFile file(p["storeFile"]); storePassword p["storePassword"]; keyAlias p["keyAlias"]; keyPassword p["keyPassword"]} } }' build.gradle
          sed -i '/buildTypes {/,/release {/ s/release {/release { signingConfig signingConfigs.release/' build.gradle
 
      - name: Build AAB
        working-directory: android
        run: chmod +x gradlew && ./gradlew bundleRelease
 
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: alien-rush-fx-release
          path: android/app/build/outputs/bundle/release/*.aab
