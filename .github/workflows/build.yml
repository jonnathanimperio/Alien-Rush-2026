name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android
      - name: Fix gradle
        run: |
          sed -i 's/rootProject.ext.compileSdkVersion/35/' android/app/build.gradle
          sed -i 's/rootProject.ext.minSdkVersion/22/' android/app/build.gradle
          sed -i 's/rootProject.ext.targetSdkVersion/35/' android/app/build.gradle
          sed -i "s/compileSdkVersion = .*/compileSdkVersion = 35/" android/variables.gradle
          sed -i "s/targetSdkVersion = .*/targetSdkVersion = 35/" android/variables.gradle
      - name: Icons
        run: |
          B="android/app/src/main/res"
          for d in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            density="${d%%:*}"; size="${d##*:}"
            cp "resources/icon-${size}.png" "$B/mipmap-${density}/ic_launcher.png"
            cp "resources/icon-${size}.png" "$B/mipmap-${density}/ic_launcher_round.png"
          done
      - name: Manifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-6853379352980306~7008734812"/></application>|' $M
          sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |' $M
          sed -i 's|</manifest>|<uses-permission android:name="com.google.android.gms.permission.AD_ID"/></manifest>|' $M
      - name: Styles
        run: echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="AppTheme" parent="Theme.AppCompat.NoActionBar"><item name="android:windowNoTitle">true</item><item name="android:windowFullscreen">true</item><item name="android:windowContentOverlay">@null</item></style><style name="AppTheme.NoActionBar" parent="AppTheme"><item name="android:windowActionBar">false</item><item name="android:windowNoTitle">true</item></style><style name="AppTheme.NoActionBarLaunch" parent="AppTheme.NoActionBar"><item name="android:background">@android:color/black</item></style></resources>' > android/app/src/main/res/values/styles.xml
      - name: Version
        run: |
          sed -i 's/versionCode [0-9]*/versionCode 11/' android/app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "2.1.1"/' android/app/build.gradle
      - name: Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
      - name: Build
        run: |
          cd android && chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/keystore.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
      - uses: actions/upload-artifact@v4
        with:
          name: alien-rush-fx-release
          path: android/app/build/outputs/bundle/release/*.aab
