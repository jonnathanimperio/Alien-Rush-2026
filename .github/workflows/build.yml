name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android
      - name: Replace icons
        run: |
          B="android/app/src/main/res"
          cp resources/icon-48.png $B/mipmap-mdpi/ic_launcher.png
          cp resources/icon-72.png $B/mipmap-hdpi/ic_launcher.png
          cp resources/icon-96.png $B/mipmap-xhdpi/ic_launcher.png
          cp resources/icon-144.png $B/mipmap-xxhdpi/ic_launcher.png
          cp resources/icon-192.png $B/mipmap-xxxhdpi/ic_launcher.png
          cp resources/icon-48.png $B/mipmap-mdpi/ic_launcher_round.png
          cp resources/icon-72.png $B/mipmap-hdpi/ic_launcher_round.png
          cp resources/icon-96.png $B/mipmap-xhdpi/ic_launcher_round.png
          cp resources/icon-144.png $B/mipmap-xxhdpi/ic_launcher_round.png
          cp resources/icon-192.png $B/mipmap-xxxhdpi/ic_launcher_round.png
      - name: Setup manifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-6853379352980306~7008734812"/></application>|' $M
          sed -i 's|</manifest>|<uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/></manifest>|' $M
      - name: Fullscreen
        run: echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="AppTheme" parent="Theme.AppCompat.NoActionBar"><item name="android:windowNoTitle">true</item><item name="android:windowFullscreen">true</item><item name="android:windowContentOverlay">@null</item></style></resources>' > android/app/src/main/res/values/styles.xml
      - name: Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
      - name: Sign config
        run: |
          echo "storeFile=keystore.jks" > android/app/keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/app/keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/app/keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/app/keystore.properties
          python3 << 'PYEOF'
          with open("android/app/build.gradle","r") as f:
              lines = f.readlines()
          out = []
          for line in lines:
              out.append(line)
              if line.strip() == "android {":
                  out.append("    signingConfigs {\n")
                  out.append("        release {\n")
                  out.append("            def p = new Properties()\n")
                  out.append("            def f = rootProject.file('app/keystore.properties')\n")
                  out.append("            if (f.exists()) {\n")
                  out.append("                p.load(new FileInputStream(f))\n")
                  out.append("                storeFile file(p['storeFile'])\n")
                  out.append("                storePassword p['storePassword']\n")
                  out.append("                keyAlias p['keyAlias']\n")
                  out.append("                keyPassword p['keyPassword']\n")
                  out.append("            }\n")
                  out.append("        }\n")
                  out.append("    }\n")
              if line.strip().startswith("release {") and "signingConfig" not in line:
                  out.append("                signingConfig signingConfigs.release\n")
          with open("android/app/build.gradle","w") as f:
              f.writelines(out)
          PYEOF
      - name: Build
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: alien-rush-fx-release
          path: android/app/build/outputs/bundle/release/*.aab
